<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<title>G-ON — HEATMAP · CARNET RÉEL BINANCE</title>
<style>
  :root { --bg:#060604; --gold:#d9b64d; --gold-b:#f0d478; --gold-d:#6b5a2a; --border:#26200e;
          --bull:#3ecfd4; --bear:#ff2d5e; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:#cbb26a; font:12px/1.4 "Segoe UI", system-ui, sans-serif; overflow:hidden; }
  #topbar { position:fixed; inset:0 0 auto 0; height:40px; display:flex; align-items:center; gap:10px;
            padding:0 12px; background:#0a0906; border-bottom:1px solid var(--border); z-index:5; }
  #logo { width:26px; height:26px; border-radius:50%; background:radial-gradient(circle at 35% 35%, #2a2410, #0a0906);
          border:1px solid var(--gold-d); display:flex; align-items:center; justify-content:center;
          color:var(--gold-b); font-size:9px; font-weight:700; letter-spacing:.5px; }
  .symb { background:#0f0d08; border:1px solid var(--border); color:#8d8154; padding:5px 10px;
          border-radius:4px; font-size:11px; letter-spacing:1px; cursor:pointer; }
  .symb.on { color:#060604; background:linear-gradient(180deg,var(--gold-b),var(--gold)); font-weight:700;
             box-shadow:0 0 10px rgba(217,182,77,.35); }
  #status { margin-left:auto; font-size:10px; letter-spacing:1.5px; color:#7d795f;
            font-variant-numeric:tabular-nums; }
  #live { color:var(--gold-b); font-weight:700; }
  #wallsBox { position:fixed; left:10px; bottom:14px; z-index:6; background:rgba(10,9,6,.9);
              border:1px solid var(--border); border-radius:6px; padding:8px 11px; min-width:215px; }
  #wallsBox .hd { font-size:8.5px; letter-spacing:2.5px; color:var(--gold); margin-bottom:5px; }
  #wallsBox .row { display:flex; justify-content:space-between; gap:12px; font-size:10.5px; padding:1.5px 0;
                   font-variant-numeric:tabular-nums; }
  #wallsBox .p { font-family:Consolas, monospace; color:var(--gold-b); }
  #wallsBox .k { color:#7d795f; font-size:9px; letter-spacing:.6px; }
  #wallsBox .fled .p { color:#6e6a58; text-decoration:line-through; }
  #wallsBox .fled .k { color:#8a5560; }
  #legend { position:fixed; bottom:8px; left:50%; transform:translateX(-50%); z-index:8;
            background:rgba(10,9,6,.95); border:1px solid var(--gold-d); border-radius:6px;
            padding:8px 14px; font-size:10px; color:#b3a67f; display:flex; gap:10px; align-items:center;
            flex-wrap:wrap; justify-content:center; max-width:94vw; white-space:nowrap; }
  #legend b { color:var(--gold-b); }
  #legend button { background:#0f0d08; border:1px solid var(--border); color:#8d8154; padding:4px 10px;
                   border-radius:3px; font-size:10px; letter-spacing:1px; cursor:pointer; }
  #legend button.on { color:#060604; background:linear-gradient(180deg,var(--gold-b),var(--gold)); font-weight:700; }
  canvas#cv { position:fixed; left:0; top:40px; right:0; bottom:0; width:100vw; height:calc(100vh - 40px); }
  #tip { position:fixed; display:none; z-index:20; pointer-events:none;
         background:rgba(10,9,6,.96); border:1px solid var(--gold-d); border-radius:5px;
         padding:5px 9px; font-size:10.5px; color:#e8dcb0; font-variant-numeric:tabular-nums;
         box-shadow:0 4px 14px rgba(0,0,0,.5); }
  #tip b { color:var(--gold-b); font-family:Consolas, monospace; }
</style>
</head>
<body>
  <div id="topbar">
    <div id="logo">G·ON</div>
    <button class="symb on" data-s="BTCUSDT">BTCUSDT</button>
    <button class="symb" data-s="ETHUSDT">ETHUSDT</button>
    <button class="symb" data-s="SOLUSDT">SOLUSDT</button>
    <span style="font-size:9px; letter-spacing:2px; color:var(--gold)">◱ HEATMAP · <span id="live">DONNÉES RÉELLES</span></span>
    <span id="status">connexion…</span>
  </div>

  <canvas id="cv"></canvas>

  <div id="wallsBox">
    <div class="hd">MURS SUIVIS · RÉEL</div>
    <div id="wallsRows"><div class="row"><span class="k">en attente du carnet…</span></div></div>
  </div>

  <div id="legend">
    <span style="letter-spacing:2px; color:var(--gold)">STYLE :</span>
    <button data-r="braise" class="on">BRAISE</button>
    <button data-r="filaments">FILAMENTS</button>
    <button data-r="lingot">LINGOT</button>
    <button data-r="sillage">SILLAGE</button>
    <button data-r="cicatrice">CICATRICE</button>
    <button data-r="soie">SOIE</button>
    <button data-r="net">NET</button>
    <button data-r="camps">CAMPS</button>
    <button id="scaleBtn" class="on">ÉCHELLE $</button>
    <span style="letter-spacing:2px; color:var(--gold)">· DÉGRADÉ :</span>
    <button data-g="braise" class="on">BRAISE</button>
    <button data-g="or">OR</button>
    <button data-g="glace">GLACE</button>
    <button data-g="ivoire">IVOIRE</button>
    <span style="letter-spacing:2px; color:var(--gold)">· INTENSITÉ</span>
    <input id="intSlider" type="range" min="40" max="220" value="100"
           style="width:110px; accent-color:#d9b64d; vertical-align:middle">
    <span>· <b>survolez</b> pour la valeur exacte</span>
  </div>
  <div id="tip"></div>

<script>
"use strict";
const BULL = '#3ecfd4', BEAR = '#ff2d5e', GOLD = '#d9b64d', GOLD_B = '#f0d478';
const rgba = (hex, a) => { const n = parseInt(hex.slice(1), 16);
  return `rgba(${n>>16&255},${n>>8&255},${n&255},${a})`; };
const fmtUsd = v => v >= 1e6 ? (v/1e6).toFixed(1)+'M$' : v >= 1e3 ? (v/1e3).toFixed(0)+'k$' : v.toFixed(0)+'$';

const EVERY = 2500, CAP = 1440;               /* 2.5 s × 1440 = 60 min de mémoire */
let sym = 'BTCUSDT', binSize = 0, priceDec = 1;
let samples = [], wallHist = new Map(), walls = [], fled = [];
let style = 'braise';
let showScale = true;                         /* option : le dégradé en échelle de valeurs $ */
let ramp = 'braise';                          /* option : dégradé de couleurs de la map */
let intensity = 1;                            /* option : slider d'intensité */
let lastView = null;                          /* contexte du dernier rendu, pour le survol */

/* ---- rampes 256 teintes précalculées : [q, r, g, b, a] ; plancher net sous q=0.10 ---- */
function buildRamp(stops) {
  const L = new Uint8ClampedArray(256*4);
  for (let i = 0; i < 256; i++) {
    const q = i/255;
    let a = stops[0], b = stops[stops.length-1];
    for (let s = 0; s < stops.length-1; s++)
      if (q >= stops[s][0] && q <= stops[s+1][0]) { a = stops[s]; b = stops[s+1]; break; }
    const t = (q - a[0]) / ((b[0] - a[0]) || 1);
    for (let c = 0; c < 4; c++) L[i*4+c] = Math.round(a[c+1] + (b[c+1] - a[c+1])*t);
  }
  return L;
}
const LUT_OR = buildRamp([
  [0.00,  26,  20,   8,   0], [0.10,  40,  32,  14,   0],
  [0.28, 107,  90,  42,  80], [0.55, 217, 182,  77, 160],
  [0.80, 240, 212, 120, 225], [1.00, 255, 248, 224, 255],
]);
const LUT_BULL = buildRamp([
  [0.00,   6,  42,  44,   0], [0.10,  10,  52,  54,   0],
  [0.28,  20,  90,  94,  80], [0.55,  62, 207, 212, 160],
  [0.80, 150, 236, 240, 225], [1.00, 234, 255, 255, 255],
]);
const LUT_BEAR = buildRamp([
  [0.00,  44,  10,  20,   0], [0.10,  54,  12,  24,   0],
  [0.28, 110,  30,  50,  80], [0.55, 255,  45,  94, 160],
  [0.80, 255, 140, 170, 225], [1.00, 255, 234, 240, 255],
]);
const LUT_BRAISE = buildRamp([                            /* braise sous la cendre → cœur incandescent */
  [0.00, 107,  90,  42,   0], [0.16, 107,  90,  42,   0],
  [0.47, 166, 136,  60,  51], [0.82, 217, 182,  77, 140],
  [1.00, 240, 212, 120, 191],
]);
const LUT_IVOIRE = buildRamp([                            /* monochrome ivoire, sobriété maximale */
  [0.00,  60,  54,  38,   0], [0.16,  60,  54,  38,   0],
  [0.47, 150, 138, 110,  60], [0.82, 225, 215, 190, 150],
  [1.00, 255, 250, 235, 205],
]);
const RAMPS = { braise: LUT_BRAISE, or: LUT_OR, glace: LUT_BULL, ivoire: LUT_IVOIRE };

const cv = document.getElementById('cv'), ctx = cv.getContext('2d');
const off = document.createElement('canvas'), octx = off.getContext('2d');
const tmp = document.createElement('canvas'), tctx = tmp.getContext('2d');
const prj = document.createElement('canvas'), prjx = prj.getContext('2d');
function sizeOf(c) { const r = c.getBoundingClientRect(), d = devicePixelRatio||1;
  c.width = Math.round(r.width*d); c.height = Math.round(r.height*d);
  c.getContext('2d').setTransform(d,0,0,d,0,0); return [r.width, r.height]; }

for (const b of document.querySelectorAll('.symb')) b.onclick = () => {
  sym = b.dataset.s; binSize = 0; samples = []; wallHist.clear(); walls = []; fled = [];
  for (const x of document.querySelectorAll('.symb')) x.classList.toggle('on', x === b);
  document.getElementById('status').textContent = 'connexion…'; render(); };
for (const b of document.querySelectorAll('#legend button[data-r]')) b.onclick = () => {
  style = b.dataset.r;
  for (const x of document.querySelectorAll('#legend button[data-r]')) x.classList.toggle('on', x === b);
  render(); };
document.getElementById('scaleBtn').onclick = () => {
  showScale = !showScale;
  document.getElementById('scaleBtn').classList.toggle('on', showScale);
  render(); };
for (const b of document.querySelectorAll('#legend button[data-g]')) b.onclick = () => {
  ramp = b.dataset.g;
  for (const x of document.querySelectorAll('#legend button[data-g]')) x.classList.toggle('on', x === b);
  render(); };
document.getElementById('intSlider').oninput = e => { intensity = +e.target.value/100; render(); };

async function poll() {
  try {
    const r = await fetch(`https://fapi.binance.com/fapi/v1/depth?symbol=${sym}&limit=500`);
    if (!r.ok) throw new Error(r.status);
    const d = await r.json();
    if (!d.bids?.length || !d.asks?.length) throw new Error('vide');
    const mid = (+d.bids[0][0] + +d.asks[0][0]) / 2;
    if (!binSize) {                                       /* pas de bin : la portée réelle des 500 niveaux / ~70 */
      const span = Math.max(mid*1e-4, +d.asks[d.asks.length-1][0] - +d.bids[d.bids.length-1][0]);
      const raw = span / 70, e = Math.pow(10, Math.floor(Math.log10(raw))), m = raw/e;
      binSize = e * (m < 1.5 ? 1 : m < 3.5 ? 2 : m < 7.5 ? 5 : 10);
      priceDec = binSize < .1 ? 3 : binSize < 1 ? 2 : binSize < 10 ? 1 : 0;
    }
    const bins = new Map();                               /* USD réellement posés par palier de prix */
    for (const [p, q] of d.bids) { const k = Math.floor(+p/binSize); bins.set(k, (bins.get(k)||0) + (+p)*(+q)); }
    for (const [p, q] of d.asks) { const k = Math.floor(+p/binSize); bins.set(k, (bins.get(k)||0) + (+p)*(+q)); }
    samples.push({ t: Date.now(), mid, bins });
    if (samples.length > CAP) samples.shift();
    trackWalls();
    render();
    const mins = (samples.length - 1) * EVERY / 60000;
    document.getElementById('status').textContent =
      `fapi.binance.com · pas ${binSize < 1 ? binSize.toFixed(2) : binSize} · ${samples.length} sondes · ${mins.toFixed(1)} min d'histoire`;
  } catch (e) {
    document.getElementById('status').textContent = 'Binance injoignable — nouvelle tentative…';
  }
}

function trackWalls() {
  const s = samples[samples.length - 1];
  let max = 0; for (const v of s.bins.values()) if (v > max) max = v;
  if (!max) return;
  const seen = new Set();
  for (const [k, v] of s.bins) if (v >= .30*max) { wallHist.set(k, (wallHist.get(k)||0) + 1); seen.add(k); }
  for (const [k, c] of [...wallHist]) if (!seen.has(k)) {
    if (c >= 48 && (s.bins.get(k)||0) < .12*max) {        /* gros mur tenu ≥2 min qui s'évapore = fuite */
      const at = new Date();
      fled.unshift({ p: (k + .5)*binSize, at: `${String(at.getHours()).padStart(2,'0')}:${String(at.getMinutes()).padStart(2,'0')}` });
      fled = fled.slice(0, 3);
    }
    wallHist.delete(k);
  }
  walls = [...s.bins].filter(([k, v]) => v >= .45*max && (wallHist.get(k)||0) >= 4)
    .map(([k, v]) => ({ p: (k + .5)*binSize, usd: v, mins: (wallHist.get(k)||0)*EVERY/60000 }))
    .sort((a, b) => b.usd - a.usd).slice(0, 4);
  const rows = walls.map(w =>
    `<div class="row"><span class="p">${w.p.toFixed(priceDec)}</span>` +
    `<span class="k">${fmtUsd(w.usd)} · TENU ${w.mins < 1 ? '<1' : Math.round(w.mins)} min</span></div>`)
    .concat(fled.map(f =>
      `<div class="row fled"><span class="p">${f.p.toFixed(priceDec)}</span><span class="k">FUITE ${f.at}</span></div>`));
  document.getElementById('wallsRows').innerHTML =
    rows.length ? rows.join('') : '<div class="row"><span class="k">accumulation en cours…</span></div>';
}

function render() {
  const [W, H] = sizeOf(cv);
  ctx.clearRect(0, 0, W, H);
  const left = 10, right = W - 76, top = 22, bottom = H - 46;
  const plotW = right - left, plotH = bottom - top;
  const projW = Math.min(150, Math.round(plotW*.15)), histW = plotW - projW;
  if (samples.length < 2) {
    ctx.fillStyle = '#7d795f'; ctx.font = '11px Segoe UI'; ctx.textAlign = 'center';
    ctx.fillText('le carnet réel se remplit… (première image dans ~5 s)', W/2, H/2); ctx.textAlign = 'left';
    return;
  }
  const vis = samples.slice(-Math.min(samples.length, 720));

  /* fenêtre de prix : l'étendue RÉELLE du carnet visible sur la période */
  let kLo = Infinity, kHi = -Infinity, max = 0;
  for (const s of vis) for (const k of s.bins.keys()) { if (k < kLo) kLo = k; if (k > kHi) kHi = k; }
  kLo -= 2; kHi += 2;
  const rows = kHi - kLo + 1;
  const pLo = kLo*binSize, pHi = (kHi + 1)*binSize;
  const Y = p => top + (pHi - p)/(pHi - pLo)*plotH;
  for (const s of vis) for (const v of s.bins.values()) if (v > max) max = v;
  if (!max) return;
  /* référence = MÉDIANE du carnet : l'ordinaire reste sombre, seul l'anormal luit
     (q atteint 1 à 48× la médiane ; échelle log — un méga-mur sature sans éteindre le reste) */
  const vals = []; let cnt = 0;
  for (const s of vis) for (const v of s.bins.values()) if ((cnt++ & 7) === 0) vals.push(v);
  vals.sort((a, b) => a - b);
  const med = vals[vals.length >> 1] || 1;
  const qOf = v => { const r = v/med; return r <= 1 ? 0 : Math.min(1, Math.log(r)/Math.log(48)); };

  /* ---- mini-image 1 px/sonde × 1 px/palier (en prod : une seule colonne ajoutée/sonde) ---- */
  if (style !== 'lingot') {                               /* LINGOT : pas de nappe, le noir reste nu */
    off.width = vis.length; off.height = rows;
    const img = octx.createImageData(vis.length, rows), px = img.data;
    const dual = style === 'camps', braise = style === 'braise';
    const coolFrom = Math.max(1, vis.length - 96);        /* BRAISE : 4 dernières minutes à pleine chaleur */
    const grid = new Float32Array(vis.length*rows);
    for (let i = 0; i < vis.length; i++) {
      const s = vis[i];
      const cool = braise && i < coolFrom ? .55 + .45*(i/coolFrom) : 1;
      for (const [k, v] of s.bins) {
        if (k < kLo || k > kHi) continue;
        grid[(kHi - k)*vis.length + i] = qOf(v)*cool;
      }
    }
    let G = grid;
    if (braise) {
      /* feutrage des extrémités : chaque cellule diffuse une demi-teinte sur ses
         voisines vides (H puis V) AVANT le lissage GPU — fini les coins cubiques */
      const gh = new Float32Array(vis.length*rows);
      for (let r = 0; r < rows; r++) {
        const o = r*vis.length;
        for (let i = 0; i < vis.length; i++)
          gh[o+i] = Math.max(grid[o+i], .55*(i > 0 ? grid[o+i-1] : 0), .55*(i < vis.length-1 ? grid[o+i+1] : 0));
      }
      const gv = new Float32Array(vis.length*rows);
      for (let r = 0; r < rows; r++) {
        const o = r*vis.length, oU = (r-1)*vis.length, oD = (r+1)*vis.length;
        for (let i = 0; i < vis.length; i++)
          gv[o+i] = Math.max(gh[o+i], .45*(r > 0 ? gh[oU+i] : 0), .45*(r < rows-1 ? gh[oD+i] : 0));
      }
      G = gv;
    }
    const LUT_MAP = braise ? RAMPS[ramp] : LUT_OR;
    for (let r = 0; r < rows; r++) {
      const o = r*vis.length, k = kHi - r;
      for (let i = 0; i < vis.length; i++) {
        const q = Math.min(1, G[o+i]*intensity);
        if (q <= 0) continue;
        const L = dual ? ((k + .5)*binSize < vis[i].mid ? LUT_BULL : LUT_BEAR) : LUT_MAP;
        const li = Math.round(q*255)*4;
        const p2 = (o+i)*4;
        px[p2] = L[li]; px[p2+1] = L[li+1]; px[p2+2] = L[li+2]; px[p2+3] = L[li+3];
      }
    }
    octx.putImageData(img, 0, 0);

    if (style === 'net' || style === 'sillage') {
      /* NET : pixels francs — SILLAGE : le même, assourdi, en fond de contexte */
      ctx.imageSmoothingEnabled = false;
      if (style === 'sillage') ctx.globalAlpha = .30;
      ctx.drawImage(off, 0, 0, vis.length, rows, left, top, histW, plotH);
      ctx.globalAlpha = 1;
    } else if (braise) {
      /* BRAISE : halo lissé seul — la passe de grain net accusait les coins (retour Meddy) */
      ctx.imageSmoothingEnabled = true; ctx.imageSmoothingQuality = 'high';
      ctx.drawImage(off, 0, 0, vis.length, rows, left, top, histW, plotH);
    } else {
      /* SOIE / CAMPS / base FILAMENTS & CICATRICE : colonnes franches en X, fondu seulement en Y
         (étirement en 2 temps : X sans lissage, puis Y avec lissage GPU) */
      tmp.width = Math.max(1, Math.round(histW)); tmp.height = rows;
      tctx.imageSmoothingEnabled = false;
      tctx.clearRect(0, 0, tmp.width, rows);
      tctx.drawImage(off, 0, 0, vis.length, rows, 0, 0, tmp.width, rows);
      ctx.imageSmoothingEnabled = true; ctx.imageSmoothingQuality = 'high';
      if (style === 'filaments') ctx.globalAlpha = .45;
      if (style === 'cicatrice') ctx.globalAlpha = .40;
      ctx.drawImage(tmp, 0, 0, tmp.width, rows, left, top, histW, plotH);
      ctx.globalAlpha = 1;
    }
  }

  if (style === 'filaments') {
    /* FILAMENTS : la base en retrait + les murs en traits laser, le langage de l'app.
       Épaisseur = taille du mur ; la valeur se lit sans effort. */
    const FIL_T = .32;                                    /* filament dès ~3.5× la normale */
    const cw2 = histW / vis.length, rh = plotH / rows;
    for (let k = kLo; k <= kHi; k++) {
      const y = top + (kHi - k + .5)*rh;
      let i0 = -1, qMax = 0;
      for (let i = 0; i <= vis.length; i++) {
        const v = i < vis.length ? (vis[i].bins.get(k) || 0) : 0;
        const q = v > 0 ? qOf(v) : 0;
        const on = q >= FIL_T;
        if (on && i0 < 0) { i0 = i; qMax = q; }
        else if (on) { if (q > qMax) qMax = q; }
        else if (i0 >= 0) {
          ctx.strokeStyle = rgba(qMax >= .80 ? '#fff8e0' : GOLD_B, .35 + .6*qMax);
          ctx.lineWidth = 1 + 2.6*(qMax - FIL_T)/(1 - FIL_T);
          if (qMax >= .80) { ctx.shadowColor = GOLD_B; ctx.shadowBlur = 6; }
          ctx.beginPath(); ctx.moveTo(left + i0*cw2, y); ctx.lineTo(left + i*cw2, y); ctx.stroke();
          ctx.shadowBlur = 0; i0 = -1;
        }
      }
    }
    /* étiquettes prix · montant des murs POSÉS MAINTENANT, au bord droit */
    const last = vis[vis.length - 1], items = [];
    for (const [k, v] of last.bins) {
      if (k < kLo || k > kHi) continue;
      const q = qOf(v);
      if (q >= FIL_T) items.push({ y: top + (kHi - k + .5)*rh, p: (k + .5)*binSize, v, q });
    }
    items.sort((a, b) => b.q - a.q); items.length = Math.min(items.length, 8);
    items.sort((a, b) => a.y - b.y);
    let prevY = -1e9;
    ctx.textAlign = 'right'; ctx.font = '700 9px Consolas, monospace';
    for (const it of items) {
      const y = Math.max(it.y, prevY + 12); prevY = y;
      const txt = `${it.p.toFixed(priceDec)} · ${fmtUsd(it.v)}`;
      const w = ctx.measureText(txt).width;
      ctx.fillStyle = 'rgba(8,7,4,.85)';
      ctx.fillRect(right - w - 12, y - 6.5, w + 9, 13);
      ctx.fillStyle = it.q >= .80 ? '#fff8e0' : GOLD_B;
      ctx.fillText(txt, right - 6, y + 3.5);
    }
    ctx.textAlign = 'left';
  }

  /* « coureurs » : segments temporels continus d'un palier au-dessus d'un seuil = la vie d'un mur */
  function runsOf(thr, minLen) {
    const out = [];
    for (let k = kLo; k <= kHi; k++) {
      let i0 = -1, qMax = 0, vMax = 0;
      for (let i = 0; i <= vis.length; i++) {
        const v = i < vis.length ? (vis[i].bins.get(k) || 0) : 0;
        const q = v > 0 ? qOf(v) : 0;
        if (q >= thr) {
          if (i0 < 0) { i0 = i; qMax = q; vMax = v; }
          else { if (q > qMax) qMax = q; if (v > vMax) vMax = v; }
        } else if (i0 >= 0) {
          if (i - i0 >= minLen) out.push({ k, i0, i1: i, qMax, vMax, live: i === vis.length });
          i0 = -1;
        }
      }
    }
    return out;
  }

  if (style === 'lingot') {
    /* LINGOT : corps d'ombre massif, chant poli qui accroche la lumière, poinçons de tenue */
    const cw2 = histW/vis.length, rh = plotH/rows;
    for (const r0 of runsOf(.35, 2)) {
      const q = r0.qMax, y = top + (kHi - r0.k + .5)*rh;
      const x0 = left + r0.i0*cw2, w = (r0.i1 - r0.i0)*cw2;
      const h = Math.max(3, Math.min(9, 2 + 6*q));
      ctx.fillStyle = rgba(GOLD, .05 + .13*q*q);
      ctx.fillRect(x0, y - h/2, w, h);
      const edgeA = Math.min(.72, .15 + .45*q + .0008*(r0.i1 - r0.i0));
      ctx.fillStyle = rgba(GOLD_B, r0.live ? edgeA : edgeA*.45);
      ctx.fillRect(x0, y - h/2, w, 1);
      ctx.fillStyle = 'rgba(107,90,42,.35)';
      ctx.fillRect(x0, y + h/2 - 1, w, 1);
      if (!r0.live) {                                     /* l'empreinte dans le feutre après retrait */
        ctx.fillStyle = 'rgba(107,90,42,.10)';
        ctx.fillRect(x0 + w, y, (vis.length - r0.i1)*cw2, 1);
      }
      for (let n = 1, c = r0.i0 + 120; c < r0.i1 && n <= 6; n++, c += 120) {
        ctx.fillStyle = rgba(GOLD_B, .7);                 /* un poinçon frappé toutes les 5 min tenues */
        ctx.fillRect(left + c*cw2 - 1, y - h/2 - 3, 2, 2);
      }
    }
  }

  if (style === 'sillage') {
    /* SILLAGE : l'âge d'un mur = la longueur de son trait ; fuite = cassure + fantôme pointillé */
    const cw2 = histW/vis.length, rh = plotH/rows;
    const rs = runsOf(.32, 4);
    for (const r0 of rs) r0.camp = (r0.k + .5)*binSize < vis[r0.i0].mid ? BULL : BEAR;
    rs.sort((a, b) => b.qMax - a.qMax);
    const kept = {}, sel = [];
    for (const r0 of rs) { kept[r0.camp] = (kept[r0.camp]||0) + 1; if (kept[r0.camp] <= 10) sel.push(r0); }
    for (const r0 of sel) {
      const q = r0.qMax, y = top + (kHi - r0.k + .5)*rh;
      const x0 = left + r0.i0*cw2, x1 = left + r0.i1*cw2;
      const h = Math.min(5, Math.round(1 + 3*q));
      ctx.fillStyle = rgba(r0.camp, .10 + .45*q);
      ctx.fillRect(x0, y - h/2, x1 - x0, h);
      if (r0.i1 - r0.i0 >= 240) {                         /* fil dur du mur mûr (>10 min) */
        ctx.fillStyle = rgba(r0.camp, Math.min(.9, .28 + .45*q));
        ctx.fillRect(x0, y, x1 - x0, 1);
      }
      if (!r0.live) {
        ctx.fillStyle = rgba(r0.camp, .9);                /* la cassure */
        ctx.fillRect(x1 - 1, y - h, 1, 2*h);
        ctx.strokeStyle = rgba(r0.camp, .12); ctx.lineWidth = 1; ctx.setLineDash([2,4]);
        ctx.beginPath(); ctx.moveTo(x1, y + .5); ctx.lineTo(left + histW, y + .5); ctx.stroke();
        ctx.setLineDash([]);
      }
    }
  }

  if (style === 'cicatrice') {
    /* CICATRICE : naissances jalonnées, fuites gravées (contour barré + heure) sur fond assourdi */
    const cw2 = histW/vis.length, rh = plotH/rows;
    const evs = runsOf(.35, 24);
    for (const r0 of evs) r0.camp = (r0.k + .5)*binSize < vis[r0.i0].mid ? BULL : BEAR;
    evs.sort((a, b) => (b.live - a.live) || (b.i1 - a.i1) || (b.qMax - a.qMax));
    evs.length = Math.min(evs.length, 24);
    let labels = 0;
    ctx.font = '9px Consolas, monospace';
    for (const r0 of evs) {
      const q = r0.qMax, y = top + (kHi - r0.k + .5)*rh;
      const x0 = left + r0.i0*cw2, x1 = left + r0.i1*cw2;
      if (r0.live) {
        ctx.fillStyle = rgba(r0.camp, .8);                /* chevron de naissance */
        ctx.beginPath(); ctx.moveTo(x0, y - 3); ctx.lineTo(x0 + 4, y); ctx.lineTo(x0, y + 3);
        ctx.closePath(); ctx.fill();
        ctx.fillStyle = rgba(r0.camp, .30);               /* trait de vie */
        ctx.fillRect(x0, y, left + histW - x0, 1);
        for (let n = 1, c = r0.i0 + 120; c < vis.length && n <= 12; n++, c += 120) {
          ctx.fillStyle = rgba(r0.camp, .5);              /* une encoche par 5 min tenues */
          ctx.fillRect(left + c*cw2, y + 2, 1, 2);
        }
      } else {
        const h = Math.max(3, Math.min(9, 2 + 6*q));
        ctx.strokeStyle = rgba(r0.camp, .35); ctx.lineWidth = 1;
        ctx.strokeRect(x0, y - h/2, x1 - x0, h);
        ctx.strokeStyle = 'rgba(255,45,94,.6)';           /* la balafre */
        ctx.beginPath(); ctx.moveTo(x0, y + h/2); ctx.lineTo(x1, y - h/2); ctx.stroke();
        if (labels < 10) {
          labels++;
          const d = new Date(vis[Math.max(0, r0.i1 - 1)].t);
          ctx.fillStyle = rgba(GOLD_B, .6);
          ctx.fillText(`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`, x1 + 3, y + 3);
        }
      }
    }
  }

  if (style === 'braise') {
    /* BRAISE : l'étincelle du présent — pastilles des ≤4 murs les plus chauds, bord droit */
    const rh = plotH/rows, lastS = vis[vis.length - 1];
    const hot = [...lastS.bins].map(([k, v]) => [k, qOf(v)])
      .filter(x => x[1] >= .6 && x[0] >= kLo && x[0] <= kHi)
      .sort((a, b) => b[1] - a[1]).slice(0, 4);
    for (const [k, q] of hot) {
      const y = top + (kHi - k + .5)*rh;
      ctx.fillStyle = rgba(GOLD_B, .25);
      ctx.beginPath(); ctx.arc(left + histW - 5, y, 4 + 3*q, 0, Math.PI*2); ctx.fill();
    }

    if (showScale) {
      /* le dégradé lui-même comme échelle de valeurs, en $ RÉELS — recalculés à chaque
         sonde ; le slider d'intensité décale l'échelle (couleur = v tel que q·intensité) */
      const SC = RAMPS[ramp];
      const sh = 150, sw = 10, sx = left + 12, sy = bottom - 150 - sh;
      ctx.fillStyle = 'rgba(8,7,4,.82)';
      ctx.fillRect(sx - 7, sy - 24, 122, sh + 44);
      ctx.strokeStyle = 'rgba(107,90,42,.5)'; ctx.lineWidth = 1;
      ctx.strokeRect(sx - 6.5, sy - 23.5, 121, sh + 43);
      ctx.fillStyle = rgba(GOLD, .9); ctx.font = '8px Segoe UI';
      ctx.fillText('LIQUIDITÉ POSÉE · RÉEL', sx - 1, sy - 11);
      for (let p2 = 0; p2 < sh; p2++) {
        const q = 1 - p2/(sh - 1), li = Math.round(q*255)*4;
        ctx.fillStyle = `rgba(${SC[li]},${SC[li+1]},${SC[li+2]},${Math.max(.10, SC[li+3]/255)})`;
        ctx.fillRect(sx, sy + p2, sw, 1);
      }
      ctx.font = '9px Consolas, monospace';
      for (const q of [1, .82, .47, .16]) {
        const y = sy + (1 - q)*(sh - 1);
        ctx.fillStyle = rgba(GOLD_B, .85);
        ctx.fillRect(sx + sw + 1, y, 3, 1);
        ctx.fillText(fmtUsd(med*Math.pow(48, Math.min(1.1, q/intensity))), sx + sw + 7, y + 3);
      }
      ctx.fillStyle = '#7d795f'; ctx.font = '8px Segoe UI';
      ctx.fillText(`sous ${fmtUsd(med)} : éteint`, sx - 1, sy + sh + 13);
    }
  }

  /* ---- L'AVANCE : le carnet ACTUEL projeté à droite du présent ----
     (pas une prédiction : ce sont les ordres réellement posés — ce que le prix va rencontrer) */
  ctx.strokeStyle = 'rgba(217,182,77,.22)'; ctx.lineWidth = 1;
  ctx.setLineDash([2,3]);
  ctx.beginPath(); ctx.moveTo(left + histW + .5, top); ctx.lineTo(left + histW + .5, bottom); ctx.stroke();
  ctx.setLineDash([]);
  {
    const lastS = vis[vis.length - 1], dual2 = style === 'camps';
    const lastQ = new Float32Array(rows);
    for (const [k, v] of lastS.bins) if (k >= kLo && k <= kHi) lastQ[kHi - k] = qOf(v);
    prj.width = 1; prj.height = rows;
    const pimg = prjx.createImageData(1, rows), pd = pimg.data;
    for (let r = 0; r < rows; r++) {
      /* extrémités feutrées ici aussi : demi-teinte diffusée sur les paliers voisins */
      const q = Math.min(1, Math.max(lastQ[r], .45*(r > 0 ? lastQ[r-1] : 0), .45*(r < rows-1 ? lastQ[r+1] : 0))*intensity);
      if (q <= 0) continue;
      const k = kHi - r;
      const L = style === 'braise' ? RAMPS[ramp] : dual2 ? ((k + .5)*binSize < lastS.mid ? LUT_BULL : LUT_BEAR) : LUT_OR;
      const li = Math.round(q*255)*4;
      const o = r*4;
      pd[o] = L[li]; pd[o+1] = L[li+1]; pd[o+2] = L[li+2]; pd[o+3] = Math.round(L[li+3]*.55);
    }
    prjx.putImageData(pimg, 0, 0);
    ctx.imageSmoothingEnabled = true; ctx.imageSmoothingQuality = 'high';
    ctx.drawImage(prj, 0, 0, 1, rows, left + histW + 2, top, projW - 2, plotH);
    ctx.fillStyle = '#7d795f'; ctx.font = '8px Segoe UI';
    ctx.fillText('EN AVANCE · carnet posé', left + histW + 6, top + 10);
  }

  /* échelle de prix réelle */
  ctx.fillStyle = '#7d795f'; ctx.font = '10px Consolas, monospace';
  ctx.strokeStyle = 'rgba(217,182,77,.06)';
  for (let g = 0; g <= 6; g++) {
    const y = top + g/6*plotH, p = pHi - g/6*(pHi - pLo);
    ctx.beginPath(); ctx.moveTo(left, y); ctx.lineTo(right, y); ctx.stroke();
    ctx.fillText(p.toFixed(priceDec), right + 6, y + 3);
  }
  ctx.fillStyle = '#9d8a52'; ctx.font = '600 11px Segoe UI';
  ctx.fillText(`${sym} · Perp · carnet réel, 500 niveaux/côté`, left, 14);

  /* trajet réel du prix par-dessus */
  ctx.strokeStyle = rgba(BULL, .9); ctx.lineWidth = 1.4;
  ctx.shadowColor = BULL; ctx.shadowBlur = 5;
  ctx.beginPath();
  const cw = histW / vis.length;
  for (let i = 0; i < vis.length; i++) {
    const x = left + (i + .5)*cw, y = Y(vis[i].mid);
    i ? ctx.lineTo(x, y) : ctx.moveTo(x, y);
  }
  ctx.stroke();
  const lastX = left + (vis.length - .5)*cw, lastY = Y(vis[vis.length-1].mid);
  ctx.fillStyle = BULL;
  ctx.beginPath(); ctx.arc(lastX, lastY, 2.4, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.font = '700 10px Consolas, monospace';
  ctx.fillText(vis[vis.length-1].mid.toFixed(priceDec), right + 6, lastY + 3);

  lastView = { left, top, plotW, plotH, histW, kLo, kHi, rows, vis, med, qOf };
}

/* survol : la valeur exacte de n'importe quel point de l'histoire */
const tip = document.getElementById('tip');
cv.addEventListener('mousemove', e => {
  const V = lastView;
  if (!V) { tip.style.display = 'none'; return; }
  const r = cv.getBoundingClientRect();
  const mx = e.clientX - r.left, my = e.clientY - r.top;
  if (mx - V.left > V.plotW) { tip.style.display = 'none'; return; }
  const inProj = mx - V.left > V.histW;
  const i = inProj ? V.vis.length - 1 : Math.floor((mx - V.left)/V.histW*V.vis.length);
  const k = V.kHi - Math.floor((my - V.top)/V.plotH*V.rows);
  if (i < 0 || i >= V.vis.length || k < V.kLo || k > V.kHi) { tip.style.display = 'none'; return; }
  const v = V.vis[i].bins.get(k) || 0;
  if (v <= V.med) { tip.style.display = 'none'; return; }
  const d = new Date(V.vis[i].t);
  const hh = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
  tip.innerHTML = `<b>${((k + .5)*binSize).toFixed(priceDec)}</b> — <b>${fmtUsd(v)}</b>` +
    ` <span style="color:#7d795f">posés · ${inProj ? 'EN AVANCE (carnet actuel)' : hh} · ${(v/V.med).toFixed(0)}× la normale</span>`;
  tip.style.left = (e.clientX + 14) + 'px';
  tip.style.top  = (e.clientY + 12) + 'px';
  tip.style.display = 'block';
});
cv.addEventListener('mouseleave', () => { tip.style.display = 'none'; });

addEventListener('resize', render);
poll();
setInterval(poll, EVERY);
</script>
</body>
</html>
