<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' https://unpkg.com 'unsafe-inline'; style-src 'unsafe-inline'; connect-src 'self' https://fapi.binance.com wss://fstream.binance.com; img-src 'self'; media-src 'self'; base-uri 'none'">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>G-Bot — Futures Perp</title>
<style>
  :root {
    --bg: #060604; --panel: #0c0b07; --border: #26200e;
    --gold: #d9b64d; --gold-b: #f0d478; --gold-d: #8a6d2f;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); font-family: 'Segoe UI', system-ui, sans-serif; color: #cbb26a; overflow: hidden; }
  button, select, input { font-family: inherit; }

  #topbar {
    height: 46px; display: flex; align-items: center; gap: 10px; padding: 0 12px;
    background: linear-gradient(180deg, #0e0d08, #080704); border-bottom: 1px solid var(--border);
  }
  #brand {
    display: flex; align-items: center; gap: 8px;
    font-weight: 700; letter-spacing: 3px; font-size: 13px; white-space: nowrap;
    background: linear-gradient(90deg, #f5e3a0, #d9b64d, #9a7b33);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    text-shadow: 0 0 18px rgba(217,182,77,.25);
  }
  #brandWrap {
    width: 34px; height: 34px; border-radius: 50%; overflow: hidden;
    flex: none; position: relative;
    box-shadow: 0 0 10px rgba(217,182,77,.3);
  }
  #brandLogo {
    /* l'emblème occupe le centre du PNG carré : on recadre sur les 50 % centraux */
    width: 200%; height: 200%; position: absolute; left: -50%; top: -50%;
  }
  #symWrap { position: relative; }
  #symBtn {
    background: #0a0906; border: 1px solid var(--border); color: var(--gold-b); cursor: pointer;
    padding: 6px 10px; border-radius: 4px; font-size: 12px; letter-spacing: 1px; font-weight: 600; white-space: nowrap;
  }
  #symBtn:hover { border-color: var(--gold-d); box-shadow: 0 0 8px rgba(217,182,77,.2); }
  #symPanel {
    position: absolute; top: 38px; left: 0; z-index: 50; width: 210px; max-height: 420px;
    background: rgba(10,9,6,.97); border: 1px solid var(--gold-d); border-radius: 6px;
    box-shadow: 0 8px 32px rgba(0,0,0,.8), 0 0 20px rgba(217,182,77,.12);
    display: flex; flex-direction: column; overflow: hidden;
  }
  #symFilter {
    margin: 8px; padding: 6px 8px; background: #060604; border: 1px solid var(--border);
    color: var(--gold-b); border-radius: 4px; font-size: 12px; text-transform: uppercase; outline: none;
  }
  #symFilter:focus-visible { border-color: var(--gold-b); box-shadow: 0 0 8px rgba(217,182,77,.3); }
  #symList { overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--gold-d) transparent; }
  .symItem {
    display: flex; justify-content: space-between; padding: 6px 12px; cursor: pointer; font-size: 12px;
    color: #b39a55; letter-spacing: .5px;
  }
  .symItem:hover { background: rgba(217,182,77,.12); color: var(--gold-b); }
  .symItem small { color: #a89050; }   /* ≥4,5:1 sur le fond du panneau (AA) */
  #tfs { display: flex; gap: 2px; overflow-x: auto; scrollbar-width: none; flex: 1; }
  #tfs::-webkit-scrollbar { display: none; }
  .tfbtn {
    background: transparent; border: 1px solid transparent; color: #9d8a52; cursor: pointer;
    padding: 4px 7px; font-size: 11px; border-radius: 3px; white-space: nowrap;
  }
  .tfbtn:hover { color: var(--gold-b); border-color: var(--border); }
  .tfbtn.on { color: #060604; background: linear-gradient(180deg, var(--gold-b), var(--gold)); font-weight: 700; box-shadow: 0 0 10px rgba(217,182,77,.35); }
  #replayBtn {
    background: transparent; border: 1px solid var(--border); color: var(--gold); cursor: pointer;
    padding: 5px 12px; font-size: 11px; border-radius: 4px; letter-spacing: 2px; white-space: nowrap;
  }
  #replayBtn:hover, #replayBtn.on { background: rgba(217,182,77,.12); border-color: var(--gold-d); }
  #status { display: flex; align-items: center; gap: 8px; white-space: nowrap; }
  #dot { width: 8px; height: 8px; border-radius: 50%; background: #444; }
  #dot.live { background: var(--gold); box-shadow: 0 0 8px var(--gold); animation: pulse 2s infinite; }
  @keyframes pulse { 50% { opacity: .4; } }
  #lastPrice { font-size: 14px; font-weight: 600; color: var(--gold-b); font-variant-numeric: tabular-nums; min-width: 90px; text-align: right; }

  #main { display: flex; height: calc(100% - 46px); }
  #tools {
    width: 50px; display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 6px 0;
    background: linear-gradient(90deg, #0d0c08, #070603); border-right: 1px solid var(--border);
    z-index: 20; overflow-y: auto; scrollbar-width: none;   /* petite fenêtre : la colonne défile */
  }
  #tools::-webkit-scrollbar { display: none; }
  .tool {
    position: relative; width: 36px; height: 29px; flex: none;
    display: flex; align-items: center; justify-content: center;
    background: transparent; border: 1px solid transparent; border-radius: 6px;
    color: #a8905a; cursor: pointer; padding: 0;
  }
  .tool svg { width: 17px; height: 17px; display: block; }
  .tool:hover {
    color: var(--gold-b); border-color: var(--border);
    background: rgba(217,182,77,.07); box-shadow: 0 0 12px rgba(217,182,77,.10) inset;
  }
  .tool.on {
    color: #060604; background: linear-gradient(180deg, var(--gold-b), var(--gold));
    border-color: var(--gold-d); box-shadow: 0 0 14px rgba(217,182,77,.45);
  }
  .tool::after {
    content: attr(data-tip); position: absolute; left: 47px; top: 50%;
    transform: translateY(-50%) translateX(-5px);
    background: rgba(10,9,6,.97); border: 1px solid var(--gold-d); color: var(--gold-b);
    padding: 4px 10px; border-radius: 4px; font-size: 10.5px; letter-spacing: 1.2px;
    text-transform: uppercase; white-space: nowrap;
    opacity: 0; pointer-events: none; transition: opacity .15s, transform .15s; z-index: 60;
    box-shadow: 0 4px 18px rgba(0,0,0,.75), 0 0 12px rgba(217,182,77,.10);
  }
  .tool:hover::after { opacity: 1; transform: translateY(-50%) translateX(0); transition-delay: .3s; }
  #eyeBtn .eye-off { display: none; }
  #eyeBtn.hidden-draw .eye-on { display: none; }
  #eyeBtn.hidden-draw .eye-off { display: block; }
  .sep {
    width: 26px; height: 1px; flex: none; margin: 3px 0;
    background: linear-gradient(90deg, transparent, var(--gold-d), transparent);
  }

  #chartwrap { position: relative; flex: 1; }
  #chart { position: absolute; inset: 0; }
  #overlay { position: absolute; inset: 0; pointer-events: none; z-index: 5; }
  #watermark {
    position: absolute; left: 10px; bottom: 36px; width: 84px; height: 84px;
    border-radius: 50%; overflow: hidden; z-index: 4; pointer-events: none; opacity: .9;
    box-shadow: 0 0 16px rgba(217,182,77,.25), inset 0 0 0 1px var(--gold-d);
  }
  #watermark img {
    /* recadrage sur les 50 % centraux du PNG : l'emblème remplit le cercle */
    width: 200%; height: 200%; position: absolute; left: -50%; top: -50%;
  }
  #legend {
    position: absolute; top: 10px; left: 12px; z-index: 6; pointer-events: none;
    font-size: 12px; letter-spacing: .5px; color: #b39a55; text-shadow: 0 1px 3px #000;
  }
  #legend b { color: var(--gold-b); font-size: 13px; letter-spacing: 2px; }
  #legend .up { color: var(--gold-b); }
  #legend .dn { color: #b0632f; }
  #countdown {
    position: absolute; right: 0; z-index: 6; pointer-events: none;
    text-align: center; font-variant-numeric: tabular-nums; line-height: 1.2;
  }
  #countdown .cdP { font-size: 11px; font-weight: 600; padding: 2px 0; color: #060604; background: var(--gold); }
  #countdown .cdT { font-size: 10px; padding: 1px 0 2px; color: #0a0906; background: var(--gold-d); letter-spacing: .5px; }
  #txtIn {
    position: absolute; z-index: 9; display: none; background: rgba(10,9,6,.95);
    border: 1px solid var(--gold-d); color: var(--gold-b); font-size: 12px; padding: 3px 6px;
    border-radius: 3px; outline: none; width: 140px;
  }

  /* barre de propriétés flottante (tracé sélectionné) */
  #propbar {
    position: absolute; top: 12px; left: 50%; transform: translateX(-50%); z-index: 9;
    display: flex; align-items: center; gap: 7px; padding: 7px 11px;
    max-width: calc(100% - 12px); flex-wrap: wrap;   /* petite fenêtre : la barre replie au lieu de déborder */
    background: rgba(12,11,7,.96); border: 1px solid var(--gold-d); border-radius: 7px;
    box-shadow: 0 6px 24px rgba(0,0,0,.7), 0 0 20px rgba(217,182,77,.14);
  }
  .sw {
    width: 15px; height: 15px; border-radius: 50%; cursor: pointer;
    border: 1px solid rgba(0,0,0,.6); flex: none;
  }
  .sw:hover { transform: scale(1.2); }
  .sw.on { outline: 2px solid var(--gold-b); outline-offset: 1px; }
  #propColor {
    width: 24px; height: 24px; padding: 0; border: 1px solid var(--border); border-radius: 4px;
    background: none; cursor: pointer; flex: none;
  }
  #propbar select {
    background: #0a0906; border: 1px solid var(--border); color: var(--gold-b); cursor: pointer;
    padding: 3px 5px; font-size: 11px; border-radius: 4px;
  }
  #propbar .pbtn {
    background: #0a0906; border: 1px solid var(--border); color: var(--gold-b); cursor: pointer;
    width: 26px; height: 26px; border-radius: 4px; display: flex; align-items: center; justify-content: center;
  }
  #propbar .pbtn:hover { border-color: var(--gold-d); box-shadow: 0 0 8px rgba(217,182,77,.2); }
  #propbar .pbtn svg { width: 14px; height: 14px; }
  #propbar .pdiv { width: 1px; height: 20px; background: var(--border); }
  #swatches { display: flex; gap: 5px; }

  #replaybar {
    position: absolute; top: 12px; left: 50%; transform: translateX(-50%); z-index: 7;
    display: flex; align-items: center; gap: 8px; padding: 6px 12px;
    background: rgba(12,11,7,.92); border: 1px solid var(--gold-d); border-radius: 6px;
    box-shadow: 0 0 24px rgba(217,182,77,.18);
  }
  #replaybar span { font-size: 10px; letter-spacing: 3px; color: var(--gold); }
  #replaybar button, #replaybar select {
    background: #0a0906; border: 1px solid var(--border); color: var(--gold-b); cursor: pointer;
    padding: 4px 9px; font-size: 12px; border-radius: 4px;
  }
  #replaybar button:hover { border-color: var(--gold-d); }
  #hint {
    position: absolute; top: 58px; left: 50%; transform: translateX(-50%); z-index: 7;
    font-size: 11px; letter-spacing: 1px; color: var(--gold); padding: 4px 10px;
    background: rgba(12,11,7,.85); border: 1px dashed var(--gold-d); border-radius: 4px; pointer-events: none;
  }
  #ctxMenu {
    position: absolute; z-index: 70; width: 190px; padding: 10px;
    background: rgba(10,9,6,.97); border: 1px solid var(--gold-d); border-radius: 7px;
    box-shadow: 0 8px 32px rgba(0,0,0,.8), 0 0 20px rgba(217,182,77,.12);
    display: flex; flex-direction: column; gap: 7px; font-size: 11px;
  }
  #ctxMenu .cmTitle { font-size: 10px; letter-spacing: 2px; color: var(--gold); text-transform: uppercase; }
  #ctxMenu .cmPresets { display: flex; gap: 6px; }
  #ctxMenu .cmPresets button { flex: 1; height: 20px; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; }
  #ctxMenu .cmPresets button:hover { border-color: var(--gold-b); }
  #ctxMenu label { display: flex; justify-content: space-between; align-items: center; color: #b39a55; }
  #ctxMenu input[type=color] { width: 36px; height: 20px; padding: 0; border: 1px solid var(--border); border-radius: 4px; background: none; cursor: pointer; }
  #thReset { background: #0a0906; border: 1px solid var(--border); color: var(--gold-b); cursor: pointer; padding: 4px; border-radius: 4px; font-size: 11px; }
  #thReset:hover { border-color: var(--gold-d); }
  #toast {
    position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 8;
    background: #1a0a0a; border: 1px solid #7a2f2f; color: #e08c8c; font-size: 12px;
    padding: 6px 14px; border-radius: 4px; opacity: 0; transition: opacity .3s; pointer-events: none;
  }
  [hidden] { display: none !important; }
  body.busy { cursor: progress; }
  #apiban {
    position: absolute; top: 12px; left: 50%; transform: translateX(-50%); z-index: 8;
    background: #2a1608; border: 1px solid #7a4a1f; color: #e0a86c; font-size: 12px;
    padding: 5px 14px; border-radius: 5px; letter-spacing: .5px; white-space: nowrap;
    box-shadow: 0 4px 18px rgba(0,0,0,.6);
  }
</style>
</head>
<body>
<div id="topbar">
  <div id="brand"><span id="brandWrap"><img id="brandLogo" src="logo.png" alt="G-Bot"></span></div>
  <div id="symWrap">
    <button id="symBtn">BTCUSDT ▾</button>
    <div id="symPanel" hidden>
      <input id="symFilter" placeholder="SYMBOLE…" spellcheck="false">
      <div id="symList"></div>
    </div>
  </div>
  <div id="tfs"></div>
  <button id="replayBtn">⟲ REPLAY</button>
  <div id="status"><span id="dot"></span><span id="lastPrice">—</span></div>
</div>
<div id="main">
  <div id="tools">
    <button class="tool on" data-tool="cursor" data-tip="Curseur">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M12 3v5M12 16v5M3 12h5M16 12h5"/><circle cx="12" cy="12" r="1.3" fill="currentColor" stroke="none"/></svg>
    </button>
    <div class="sep"></div>
    <button class="tool" data-tool="trend" data-tip="Ligne de tendance">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M7.5 16.5l9-9"/><circle cx="5.5" cy="18.5" r="2"/><circle cx="18.5" cy="5.5" r="2"/></svg>
    </button>
    <button class="tool" data-tool="ray" data-tip="Rayon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M8 16L21 3"/><circle cx="6" cy="18" r="2"/><path d="M21 3v5M21 3h-5"/></svg>
    </button>
    <button class="tool" data-tool="arrow" data-tip="Flèche">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20L18 6M18 6h-6M18 6v6"/></svg>
    </button>
    <button class="tool" data-tool="hline" data-tip="Ligne horizontale">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M3 12h6.5M14.5 12H21"/><circle cx="12" cy="12" r="2"/></svg>
    </button>
    <button class="tool" data-tool="hray" data-tip="Rayon horizontal">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><circle cx="5.5" cy="12" r="2"/><path d="M8 12h13"/></svg>
    </button>
    <button class="tool" data-tool="alert" data-tip="Alerte de prix (son au franchissement)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 10-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 01-3.4 0"/></svg>
    </button>
    <button class="tool" data-tool="vline" data-tip="Ligne verticale">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M12 3v6.5M12 14.5V21"/><circle cx="12" cy="12" r="2"/></svg>
    </button>
    <button class="tool" data-tool="channel" data-tip="Canal parallèle">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M3 15L15 3M9 21L21 9"/></svg>
    </button>
    <button class="tool" data-tool="brush" data-tip="Pinceau">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5l4 4L9 19H5v-4L15 5z"/><path d="M13 7l4 4"/></svg>
    </button>
    <div class="sep"></div>
    <button class="tool" data-tool="rect" data-tip="Rectangle">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="4" y="6.5" width="16" height="11" rx="1"/></svg>
    </button>
    <button class="tool" data-tool="ellipse" data-tip="Ellipse">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><ellipse cx="12" cy="12" rx="8.5" ry="6"/></svg>
    </button>
    <button class="tool" data-tool="fib" data-tip="Fibonacci">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M4 5.5h16M4 10h10M4 14.5h13M4 19h16"/></svg>
    </button>
    <button class="tool" data-tool="text" data-tip="Texte">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M5.5 7V5h13v2M12 5v14M9.5 19h5"/></svg>
    </button>
    <button class="tool" data-tool="long" data-tip="Position longue">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3.5" width="16" height="17" rx="1.5"/><path d="M12 16V8M8.5 11.5L12 8l3.5 3.5"/></svg>
    </button>
    <button class="tool" data-tool="short" data-tip="Position courte">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="3.5" width="16" height="17" rx="1.5"/><path d="M12 8v8M8.5 12.5L12 16l3.5-3.5"/></svg>
    </button>
    <button class="tool" data-tool="measure" data-tip="Règle · Δ prix, %, bougies">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 16.5L16.5 3l4.5 4.5L7.5 21 3 16.5z"/><path d="M7 13l2 2M10 10l2 2M13 7l2 2"/></svg>
    </button>
    <div class="sep"></div>
    <button class="tool" id="magnetBtn" data-tip="Aimant OHLC">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h4v9a2 2 0 004 0V3h4v9a6 6 0 01-12 0V3z"/><path d="M6 7h4M14 7h4"/></svg>
    </button>
    <button class="tool on" id="eyeBtn" data-tip="Afficher / masquer les tracés">
      <svg class="eye-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s4-6.5 10-6.5S22 12 22 12s-4 6.5-10 6.5S2 12 2 12z"/><circle cx="12" cy="12" r="2.7"/></svg>
      <svg class="eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s4-6.5 10-6.5S22 12 22 12s-4 6.5-10 6.5S2 12 2 12z"/><path d="M4.5 19.5l15-15"/></svg>
    </button>
    <div class="sep"></div>
    <button class="tool" data-tool="eraser" data-tip="Gomme">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M15.5 3.5l5 5L10 19H6l-2.5-2.5 12-13z"/><path d="M10 19h11"/><path d="M9.5 9.5l5 5"/></svg>
    </button>
    <button class="tool" id="undoBtn" data-tip="Annuler le dernier tracé">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 10h10a5 5 0 010 10H9"/><path d="M8 6l-4 4 4 4"/></svg>
    </button>
    <button class="tool" id="clearBtn" data-tip="Tout effacer">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M9.5 7V4.5h5V7M6 7l1.2 13h9.6L18 7"/><path d="M10 11v5M14 11v5"/></svg>
    </button>
  </div>
  <div id="chartwrap">
    <div id="chart"></div>
    <span id="watermark"><img src="logo.png" alt=""></span>
    <canvas id="overlay"></canvas>
    <div id="legend"></div>
    <div id="countdown" hidden><div class="cdP"></div><div class="cdT"></div></div>
    <input id="txtIn" placeholder="texte + Entrée" maxlength="500">
    <div id="propbar" hidden>
      <select id="propKind" title="Type de rectangle" hidden>
        <option value="">Rectangle</option>
        <option value="ob">OB</option>
        <option value="acc">Accélération</option>
        <option value="sd">S/D</option>
      </select>
      <select id="propTf" title="TF de la zone" hidden>
        <option value="">TF</option>
      </select>
      <span id="swatches"></span>
      <input type="color" id="propColor" title="Couleur personnalisée">
      <div class="pdiv"></div>
      <select id="propWidth" title="Épaisseur">
        <option value="1">1 px</option><option value="1.5" selected>1.5 px</option>
        <option value="2">2 px</option><option value="3">3 px</option><option value="4">4 px</option>
      </select>
      <select id="propStyle" title="Style de trait">
        <option value="solid">───</option><option value="dash">╌ ╌</option><option value="dot">· · ·</option>
      </select>

function startWs(attempt = 0) {
  const s = symbol.toLowerCase(), seq = loadSeq;
  let gotMsg = false, muted = false;
  const srcInt = isSecTf() ? '1m' : tfDef().src;   // on s'abonne à l'intervalle SOURCE (secondes : aggTrade seul compte)
  ws = new WebSocket(`${WSS}?streams=${s}@aggTrade/${s}@kline_${srcInt}`);
  const watchdog = setTimeout(() => {          // WS ouvert mais muet → bascule en polling REST
    if (seq === loadSeq && !gotMsg) {
      muted = true;
      if (ws) { try { ws.close(); } catch {} ws = null; }
      clearInterval(staleTimer); staleTimer = null;   // pas d'interval orphelin à vide
      startPoll(seq);
    }
  }, 6000);
  /* flux mort en cours de session (veille, NAT) : silence > 15 s → recycle en polling */
  clearInterval(staleTimer);
  staleTimer = setInterval(() => {
    if (seq !== loadSeq || pollTimer) return;
    if (gotMsg && Date.now() - lastMsgAt > 15000) {
      muted = true;
      if (ws) { try { ws.close(); } catch {} ws = null; }
      startPoll(seq);
    }
  }, 5000);
  ws.onopen = () => {
    if (replay) return;   // reconnexion en replay : dot muet
    $('dot').classList.add('live');
    // Reconnexion = trou possible : la derniere bougie a ete tronquee pendant
    // la coupure et le premier kline recu ne REJOUE pas les bougies manquees
    // entre-temps. Rattrapage REST immediat (throttle/idempotence internes).
    if (seq === loadSeq && candles.length) (isSecTf() ? fillGapSecSoon() : fillGapSoon());
  };
  ws.onclose = () => {
    clearTimeout(watchdog);
    if (muted || seq !== loadSeq) return;   // AVANT de toucher le dot : un vieux WS ne doit pas l'éteindre
    if (!pollTimer) $('dot').classList.remove('live');
    if (!gotMsg && attempt >= 1) { startPoll(seq); return; }   // 2 connexions mortes → polling
    reconnectTimer = setTimeout(() => {
      if (seq === loadSeq && !pollTimer) startWs(gotMsg ? 0 : attempt + 1);
    }, 2000);
  };
  ws.onmessage = e => {
    if (seq !== loadSeq) return;   // message en file délivré après stopWs (TF/symbole déjà commutés)
    try {
      gotMsg = true; lastMsgAt = Date.now();
      const { stream, data: d } = JSON.parse(e.data);
      if (d.E) clockOff = d.E - Date.now();          // resynchronise l'horloge sur Binance
      if (replay || !candles.length) return;
      if (stream.endsWith('aggTrade')) {
        const p = +d.p, tt = d.T / 1000, last = candles[candles.length - 1];
        if (isSecTf()) {
          if (lastAggId && d.a > lastAggId + 1) { if (!gapFilling) fillGapSec(); }   // trou d'ids : rattrapage REST IMMÉDIAT (idempotent, non throttlé, gardé par gapFilling) — pas d'apply inline (double-compte)
          else if (d.a > lastAggId) { applyTrade(p, +d.q, tt); lastTradeMs = d.T; lastAggId = d.a; }   // idempotent : blindé contre un re-délivrage (reconnexion, proxy)
        }
        // borne haute : un trade de la bougie SUIVANTE ne doit jamais réécrire la bougie clôturée
        else if (tt >= last.time && tt < barEnd(last.time)) {
          last.close = p;
          if (p > last.high) last.high = p;
          if (p < last.low) last.low = p;
          series.update(last);
          refreshTop(); invalidate();
        } else if (tt >= barEnd(last.time)) fillGapSoon();   // kline muet mais trades vivants → rattrapage REST
      } else if (!isSecTf()) {
        const k = d.k;
        const sb = { time: k.t / 1000, open: +k.o, high: +k.h, low: +k.l, close: +k.c, volume: +k.v };
        const df = tfDef();
        if ((df.fact || 1) === 1) applyBar(sb);
        else {   // TF agrégé : la bougie source alimente le seau courant
          const bt = bucketStart(sb.time), last = candles[candles.length - 1];
          if (!last) return;
          if (bt > last.time) {
            applyBar({ time: bt, open: sb.open, high: sb.high, low: sb.low, close: sb.close, volume: sb.volume });
            bucketVols = new Map([[sb.time, sb.volume]]);   // APRÈS applyBar (qui purge le seau précédent)
          } else if (bt === last.time) {
            /* volume du seau = somme des bougies source connues ; léger sous-comptage possible
               juste après un load mi-seau (corrigé par le prochain poll/fillGap) */
            bucketVols.set(sb.time, sb.volume);
            let vol = 0; for (const v of bucketVols.values()) vol += v;
            applyBar({ time: bt, open: last.open, high: Math.max(last.high, sb.high), low: Math.min(last.low, sb.low), close: sb.close, volume: Math.max(vol, last.volume) });
          }
        }
      }
    } catch {}
  };
}

/* ---------- replay ---------- */
let replayLoading = false;
async function enterReplay() {
  if (replay || replayLoading) return;
  if (!candles.length) { toast('Replay : données pas encore chargées'); return; }
  // bloqué seulement si les candles ne correspondent PAS au contexte courant (chimère) :
  // hors-ligne sur le même symbole/TF, le replay reste utilisable (il n'a pas besoin du réseau)
  if (ctxBusy()) { toast('Replay : chargement en cours, réessaie'); return; }
  keepRange = null;                              // une fenêtre TF en attente ne doit pas fuir vers la sortie du replay
  clearTimeout(retryTimer); retryTimer = null;   // un retry qui tirerait pendant l'entrée la supplanterait en silence
  replayLoading = true;
  const seq = loadSeq;
  try {
    /* le replay rejoue les bougies DÉJÀ chargées : tout l'historique parcouru au
       scroll est pickable, et l'entrée ne déplace pas la vue (mêmes données).
       On complète seulement si on en a peu (page fraîche = 500). */
    if (candles.length < 1500 && Date.now() >= oldErrUntil) {   // best-effort, et on respecte la pause d'erreur API
      const older = await fetchOlder(1000, 4000);
      if (seq !== loadSeq) return;               // symbole/TF changé pendant le fetch
      if (Array.isArray(older) && older.length) candles = older.concat(candles);
    }
    if (!candles.length) { toast('Replay : historique indisponible'); return; }
    resetTool();                                 // le pick se fait toujours au curseur
    replay = { data: candles.slice(), i: candles.length - 1, playing: false, timer: null, picking: true };
    setAll(replay.data);
    $('replayBtn').classList.add('on');
    $('replaybar').hidden = false; $('hint').hidden = false;
    $('dot').classList.remove('live'); lastPriceTxt = '—';   // topbar honnête : pas de « live » sur du passé
    select(null);
    legend(replay.data[replay.i]);
  } catch (e) { toast('Replay : ' + e.message); }
  finally { replayLoading = false; }
}
function pickAt(time) {
  const i = replay.data.findIndex(d => d.time === time);
  if (i < 0) return;
  replay.i = i; replay.picking = false; curtainX = null;
  $('hint').hidden = true;
  setAll(replay.data.slice(0, i + 1));
  /* cadrage explicite et instantané : la bougie de départ reste en vue, marge à droite
     (sans ça, LWC ré-ancre la vue au bord droit des données tronquées → saut imprévisible) */
  const bars = Math.max(20, paneW() / (ts().options().barSpacing || 6));
  ts().setVisibleLogicalRange({ from: i - bars * .7, to: i + bars * .3 });
  legend(replay.data[i]);
  if (sel != null && drawings[sel] && futureHidden(drawings[sel])) select(null);   // pas de propbar sur un tracé masqué
}
function rpStep() {
  if (!replay || replay.picking) return;
  if (replay.i >= replay.data.length - 1) { rpPause(); toast('Fin du replay — bord droit atteint'); return; }
  replay.i++;
  const b = replay.data[replay.i];
  series.update(b);
  volSeries.update(volOf(b));
  updateInd(replay.data[replay.i - 1], b, true);
  invalidate();
  if (hoverT == null) legend(b);   // le survol d'une bougie garde sa légende, comme en live
}
function rpTick() {
  rpStep();
  if (replay && replay.playing) replay.timer = setTimeout(rpTick, 1000 / parseFloat($('rpSpeed').value));
}
function rpPlay() {
  if (!replay || replay.picking || replay.playing) return;
  replay.playing = true; $('rpPlay').textContent = '⏸';
  rpTick();
}
function rpPause() {
  if (!replay) return;
  replay.playing = false; clearTimeout(replay.timer);
  $('rpPlay').textContent = '▶';
}
function exitReplay(reload = true) {
  rpPause();
  if (reload) { try { keepRange = ts().getVisibleRange(); } catch { keepRange = null; } }   // revenir là où on ÉTUDIAIT
  replay = null; curtainX = null;
  hoverT = null;
  if (candles.length) setAll(candles);   // série ≡ HUD immédiatement, même si le load qui suit échoue (hors-ligne)
  refreshTop();   // légende sans badge REPLAY + prix restauré
  $('replayBtn').classList.remove('on');
  $('replaybar').hidden = true; $('hint').hidden = true;
  if (!$('propbar').hidden) $('propbar').style.top = '12px';   // la propbar suit la replaybar
  if (reload) load(true);   // même zoom : on revient là où on étudiait
}
$('replayBtn').onclick = () => replay ? exitReplay() : enterReplay();
$('rpExit').onclick = () => exitReplay();
$('rpPlay').onclick = () => replay && (replay.playing ? rpPause() : rpPlay());
$('rpStep').onclick = () => { rpPause(); rpStep(); };
$('rpSpeed').addEventListener('change', () => {
  if (replay && replay.playing) {   // nouvelle cadence immédiate, SANS avancer d'une bougie
    clearTimeout(replay.timer);

const cv = $('overlay'), ctx = cv.getContext('2d');
const wrap = $('chartwrap');
let cvW = 0, cvH = 0, cvDpr = 0;   // dimensions CSS + DPR en cache (pas de lecture layout par frame)
function sizeCv() {
  const r = wrap.getBoundingClientRect(), dpr = devicePixelRatio || 1;
  if (!r.width || !r.height) return;
  if (r.width === cvW && r.height === cvH && dpr === cvDpr) return;   // DPR inclus : écran 4K↔FHD à taille CSS égale
  cvW = r.width; cvH = r.height; cvDpr = dpr;
  cv.width = r.width * dpr; cv.height = r.height * dpr;
  cv.style.width = r.width + 'px'; cv.style.height = r.height + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

}
/* RO peut ne jamais délivrer selon l'environnement : triple ceinture

const DASHES = { solid: [], dash: [8,5], dot: [2,3] };
let defaultStyle = { color: '#d9b64d', width: 1.5, dash: 'solid' };
/* types sémantiques du rectangle (doctrine) : label + couleur préréglée */
const RKINDS = { ob: { label: 'OB', color: '#f0d478' }, acc: { label: 'ACC', color: '#f2984d' }, sd: { label: 'S/D', color: '#4d8fe0' } };
let rectKind = '';        // type appliqué aux prochains rectangles tracés

function hexToRgba(hex, a) {

/* --- ancrage TEMPS ABSOLU : les tracés survivent au changement de TF --- */
function lOf(t) {            // temps unix → index logique (extrapole hors données)
  const a = dataNow();
  if (!a.length || t == null) return null;
  const sec = tfDef().sec;
  if (t <= a[0].time) return (t - a[0].time) / sec;
  if (t >= a[a.length - 1].time) return a.length - 1 + (t - a[a.length - 1].time) / sec;
  let lo = 0, hi = a.length - 1;
  while (hi - lo > 1) { const m = (lo + hi) >> 1; if (a[m].time <= t) lo = m; else hi = m; }
  return lo + (t - a[lo].time) / (a[hi].time - a[lo].time);
}
function tOf(l) {            // index logique → temps unix
  const a = dataNow();
  if (!a.length || l == null) return null;
  const sec = tfDef().sec;
  const i = Math.floor(l);
  if (i < 0) return a[0].time + l * sec;
  if (i >= a.length - 1) return a[a.length - 1].time + (l - (a.length - 1)) * sec;
  return a[i].time + (l - i) * (a[i + 1].time - a[i].time);
}
let saveFailed = false, saveTimer = null;
function saveDrawings() {
  hasAlerts = drawings.some(d => d.type === 'alert');   // early-out de checkAlerts si aucune alerte
  invalidate();   // toute mutation de tracé passe par ici → redessine
  clearTimeout(saveTimer);   // pipette couleur : input en rafale → sérialisation/écriture débouncées
  saveTimer = setTimeout(() => {
    try { localStorage.setItem('orion-draw-' + symbol, JSON.stringify(drawings)); saveFailed = false; }
    catch { if (!saveFailed) { saveFailed = true; toast('Stockage local plein : tracés non sauvegardés'); } }
  }, 200);
}
/* validation profonde : une entrée corrompue (autre onglet, autre repo même origine,
   ancien schéma) ne doit jamais atteindre drawOne/hitTest — sinon exception dans le rAF */
const numOk = v => typeof v === 'number' && isFinite(v);
const ptOk = p => p && numOk(p.t) && numOk(p.price);
const TFK_LEGACY = ['6h', '12h', '3d'];   // clés retirées de la liste — les zones qui les portent SURVIVENT (zLabel les rend : H6, H12, D3)
const tfOk = t => typeof t === 'string' && (Object.hasOwn(TFSEC, t) || TFK_LEGACY.includes(t));
/* nomenclature zones (préfixe, style doctrine) : s3…s45, m1…m30, H1…H8, D1, D2, W1, W2, M1…M4 */
const zLabel = t => (t.endsWith('s') ? 's' : t.endsWith('m') ? 'm' : t.slice(-1).toUpperCase()) + t.slice(0, -1);
function drawingOk(d) {
  if (!d || typeof d.type !== 'string') return false;
  if (d.color != null && !(typeof d.color === 'string' && /^#[0-9a-f]{6}$/i.test(d.color))) return false;
  if (d.width != null && !(numOk(d.width) && d.width >= .5 && d.width <= 10)) return false;
  if (d.dash != null && !(typeof d.dash === 'string' && Object.hasOwn(DASHES, d.dash))) return false;
  if (d.kind != null && !Object.hasOwn(RKINDS, d.kind)) return false;   // pas de clé héritée (__proto__, toString…)
  if (d.tfk != null && !tfOk(d.tfk)) return false;
  switch (d.type) {
    case 'hline':   return numOk(d.price);
    case 'alert':   return numOk(d.price);
    case 'vline':   return numOk(d.t);
    case 'hray':    return numOk(d.t) && numOk(d.price);
    case 'text':    return numOk(d.t) && numOk(d.price) && typeof d.text === 'string' && d.text.length <= TEXT_MAX;
    case 'brush':   return Array.isArray(d.pts) && d.pts.length > 0 && d.pts.length <= PTS_MAX && d.pts.every(ptOk);
    case 'channel': return ptOk(d.a) && ptOk(d.b) && numOk(d.off);
    case 'long': case 'short':
      return ptOk(d.a) && !!d.b && numOk(d.b.t) && numOk(d.target) && numOk(d.stop);
    // 'measure' n'est jamais persisté légitimement (et hitTest ne sait pas le sélectionner)
    default:        return AB_TYPES.includes(d.type) && d.type !== 'measure' && ptOk(d.a) && ptOk(d.b);
  }
}
function loadDrawings() {
  try {
    const arr = JSON.parse(localStorage.getItem('orion-draw-' + symbol));
    const DKEYS = ['type', 't', 'price', 'a', 'b', 'pts', 'off', 'target', 'stop', 'color', 'width', 'dash', 'kind', 'tfk', 'text'];
    drawings = (Array.isArray(arr) ? arr : []).map(d => {
      if (!d || typeof d !== 'object') return d;
      const c = {};   // whitelist : un champ parasite volumineux ne survit pas (quota, origine partagée)
      for (const k of DKEYS) if (d[k] !== undefined) c[k] = d[k];
      // héritage pré-bornes : tronquer plutôt que perdre silencieusement
      if (typeof c.text === 'string' && c.text.length > TEXT_MAX) c.text = c.text.slice(0, TEXT_MAX);
      if (Array.isArray(c.pts) && c.pts.length > PTS_MAX) c.pts = c.pts.slice(0, PTS_MAX);
      return c;
    }).filter(drawingOk);

/* --- conversions --- */

    const h = curBar();               // (sinon le tracé naît futureHidden et « disparaît » au commit)

/* LWC v5 : logicalToCoordinate renvoie 0 pour un indice FRACTIONNAIRE (bug avéré) ;

const xOf = t => {
  const l = lOf(t);

const px = p => [xOf(p.t), p.price != null ? series.priceToCoordinate(p.price) : null];

  if (!replay) return candles;

  const m = mpos(e);

  const p = snap(lpt(e));

  toolDown = true;

    delete temp.phase;
    const d = temp; temp = null;
    if (d.a.t === d.b.t && d.a.price === d.b.price) { resetTool(); invalidate(); return; }   // canal dégénéré (2 clics sur place)
    commit(d);

  if (tool === 'alert') { unlockAudio(); commit({ type: 'alert', price: p.price, ...st, color: ALERT_COL }); return; }
  if (p.t == null) return;

  if (tool === 'hray')  { commit({ type: 'hray', t: p.t, price: p.price, ...st }); return; }

  if (tool === 'channel') { temp = { type: 'channel', a: p, b: p, off: 0, phase: 1, ...st }; return; }
  if (tool === 'long' || tool === 'short') { temp = { type: tool, a: p, b: { t: p.t }, target: p.price, stop: p.price, ...st }; return; }
  if (AB_TYPES.includes(tool)) {

    let hit = false;
    if (d.type === 'hline' || d.type === 'alert') { const y = series.priceToCoordinate(d.price); hit = y != null && Math.abs(my - y) < TH; }
    else if (d.type === 'vline') { const x = xOf(d.t); hit = x != null && Math.abs(mx - x) < TH; }
    else if (d.type === 'hray') { const [x, y] = px(d); hit = x != null && y != null && Math.abs(my - y) < TH && mx > x - TH; }
    else if (d.type === 'text') {
      const [x, y] = px(d);
      if (x != null && y != null) { ctx.font = '12px Segoe UI'; const w = ctx.measureText(d.text).width; hit = mx > x - 4 && mx < x + w + 4 && my > y - 14 && my < y + 6; }
    }
    else if (d.type === 'brush') {
      let prev = px(d.pts[0]);
      for (let j = 1; j < d.pts.length && !hit; j++) {
        const cur = px(d.pts[j]);
        if (prev[0] != null && prev[1] != null && cur[0] != null && cur[1] != null)
          hit = dSeg(mx, my, prev[0], prev[1], cur[0], cur[1]) < TH;
        prev = cur;
      }
    }
    else if (d.type === 'channel') {
      const { x1, y1, x2, y2, y1b, y2b } = chanGeom(d);
      if ([x1, y1, x2, y2, y1b, y2b].every(v => v != null)) {
        hit = dSeg(mx, my, x1, y1, x2, y2) < TH || dSeg(mx, my, x1, y1b, x2, y2b) < TH;
        if (!hit && mx > Math.min(x1, x2) && mx < Math.max(x1, x2)) {
          const f = (mx - x1) / ((x2 - x1) || 1e-9);
          const yA = y1 + (y2 - y1) * f, yB = y1b + (y2b - y1b) * f;
          hit = my > Math.min(yA, yB) && my < Math.max(yA, yB);
        }
      }
    }
    else if (d.type === 'long' || d.type === 'short') {
      const { xA, yE, xB, yT, yS } = posGeom(d);
      if ([xA, yE, xB, yT, yS].every(v => v != null))
        hit = mx > Math.min(xA, xB) - TH && mx < Math.max(xA, xB) + TH &&
              my > Math.min(yT, yS, yE) - TH && my < Math.max(yT, yS, yE) + TH;
    } else {
      const [x1, y1] = px(d.a), [x2, y2] = px(d.b);
      if (x1 == null || y1 == null || x2 == null || y2 == null) continue;
      if (d.type === 'trend' || d.type === 'arrow') hit = dSeg(mx, my, x1, y1, x2, y2) < TH;
      else if (d.type === 'ray') {
        const [ex, ey] = rayEnd(x1, y1, x2, y2);
        hit = dSeg(mx, my, x1, y1, ex, ey) < TH;
      } else if (d.type === 'rect' || d.type === 'ellipse')
        hit = mx > Math.min(x1, x2) - TH && mx < Math.max(x1, x2) + TH && my > Math.min(y1, y2) - TH && my < Math.max(y1, y2) + TH;
      else if (d.type === 'fib') {
        const xa = Math.min(x1, x2), xb = Math.max(x1, x2);
        const ya = Math.min(y1, y2), yb = Math.max(y1, y2);
        hit = mx > xa - TH && mx < xb + 60 && my > ya - TH && my < yb + TH;
      }
    }
    if (hit) return { i, part: 'body' };
  }
  return null;
}

document.addEventListener('mousemove', e => {
  if (drag) {
    if (!(e.buttons & 1)) { drag = null; wrap.style.cursor = ''; saveDrawings(); return; }   // capture perdue
    const m = mpos(e);
    let dx = m.x - drag.x0;
    const dy = m.y - drag.y0;
    const d = drawings[drag.i], o = drag.orig;
    const lim = dataNow().length + 2000;   // borne d'extrapolation, invariante sur le mousemove
    if (!('maxL' in drag)) {   // invariants du drag (orig/part figés au mousedown) : calculés UNE fois
      const mt = dragExtT(o, drag.part, Math.max), mn = dragExtT(o, drag.part, Math.min);
      drag.maxL = mt != null ? lOf(mt) : null;
      drag.minL = mn != null ? lOf(mn) : null;
    }
    /* butées RIGIDES sur le delta PARTAGÉ — jamais par ancre : ça écraserait la forme,
       et une ancre déjà au-delà de la borne serait téléportée. Bornes ±lim des deux
       côtés, plus la tête de lecture en replay ; une ancre hors borne ne peut que rentrer. */
    if (drag.maxL != null) dx = Math.min(dx, Math.max((lim - drag.maxL) * barSp, 0));
    if (drag.minL != null) dx = Math.max(dx, Math.min((-lim - drag.minL) * barSp, 0));
    if (replay && drag.maxL != null) {
      const h = curBar(), lh = h ? lOf(h.time) : null;
      if (lh != null) dx = Math.min(dx, Math.max((lh - drag.maxL) * barSp, 0));
    }
    const mvT = t => {
      /* delta appliqué en logique fractionnaire : coordinateToLogical arrondit à l'entier (ceil),
         ce qui ferait sauter d'une bougie toute ancre inter-bougies (tracé venu d'un autre TF) */
      const l = lOf(t);
      if (l == null) return t;
      const nt = tOf(l + dx / barSp);
      return nt != null ? nt : t;
    };
    const mvP = p => { const c = series.priceToCoordinate(p); const np = c != null ? series.coordinateToPrice(c + dy) : null; return np != null ? np : p; };
    if (d.type === 'long' || d.type === 'short') {
      if (drag.part === 'a') d.a = { t: mvT(o.a.t), price: mvP(o.a.price) };
      else if (drag.part === 'b') d.b = { t: mvT(o.b.t) };
      else if (drag.part === 'target') {   // la cible reste du bon côté de l'entrée (pas de boîtes inversées)
        const v = mvP(o.target);
        d.target = d.type === 'long' ? Math.max(v, d.a.price) : Math.min(v, d.a.price);
      } else if (drag.part === 'stop') {
        const v = mvP(o.stop);
        d.stop = d.type === 'long' ? Math.min(v, d.a.price) : Math.max(v, d.a.price);
      }
      else {
        d.a = { t: mvT(o.a.t), price: mvP(o.a.price) };
        d.b = { t: mvT(o.b.t) };
        d.target = mvP(o.target); d.stop = mvP(o.stop);
      }
    } else if (d.type === 'channel' && drag.part === 'c') {
      const mid = (o.a.price + o.b.price) / 2;
      d.off = mvP(mid + o.off) - mid;
    } else if (drag.part === 'a' || drag.part === 'b') {
      d[drag.part] = snap({ t: mvT(o[drag.part].t), price: mvP(o[drag.part].price) });
    } else {
      if (d.type === 'hline' || d.type === 'alert') { d.price = mvP(o.price); d.firedAt = 0; }   // déplacée = ré-armée
      else if (d.type === 'vline') d.t = mvT(o.t);
      else if (d.type === 'hray' || d.type === 'text') { d.t = mvT(o.t); d.price = mvP(o.price); }
      else if (d.type === 'brush') d.pts = o.pts.map(p => ({ t: mvT(p.t), price: mvP(p.price) }));
      else { d.a = { t: mvT(o.a.t), price: mvP(o.a.price) }; d.b = { t: mvT(o.b.t), price: mvP(o.b.price) }; }
    }
    minTCache.delete(d);   // ancres mutées → le min mémoïsé n'est plus valable
    return;
  }
  if (tool === 'cursor' && showDraw && e.target.closest('#chartwrap') && !uiGuard(e)) {
    if (replay && replay.picking) return;
    const m = mpos(e);
    if (!inPane(m)) { wrap.style.cursor = ''; return; }   // pas de pointer sur les axes
    hoverX = m.x; hoverY = m.y;
    if (!hoverQueued) {   // hit-test complet (coûteux avec de longs pinceaux) : au plus 1×/frame
      hoverQueued = true;
      requestAnimationFrame(() => {
        hoverQueued = false;
        if (tool === 'cursor' && showDraw && !drag && hoverX != null)
          wrap.style.cursor = hitTest(hoverX, hoverY) ? 'pointer' : '';
      });
    }
  }
});

function drawOne(d, isSel) {
  const col = d.color || GOLD;
  ctx.save();
  ctx.strokeStyle = col; ctx.lineWidth = d.width || 1.5;
  ctx.setLineDash(DASHES[d.dash] || []);
  ctx.fillStyle = hexToRgba(col, .10);
  ctx.font = '10px Segoe UI';
  /* glow futuriste sur les rectangles de type et les outils de tracé (demande Meddy),
     renforcé à la sélection ; coupé pendant les interactions continues (hudGlow).
     EXCLUS : long/short et la règle (multicolores — un halo doré les salirait) */
  const noGlow = d.type === 'long' || d.type === 'short' || d.type === 'measure';
  ctx.shadowColor = col;
  ctx.shadowBlur = hudGlow && !noGlow ? (isSel ? 12 : 6) : 0;   // long/short/règle : JAMAIS de halo, même sélectionnés
  const ambGlow = ctx.shadowBlur;   // les petits textes repassent à net (le halo floute la typo)
  if (d.type === 'hline') {
    const y = series.priceToCoordinate(d.price);
    if (y != null) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(paneW(), y); ctx.stroke();
      ctx.setLineDash([]); ctx.shadowBlur = 0; ctx.fillStyle = col; ctx.fillText(fmt(d.price), 6, y - 4);
    }
  } else if (d.type === 'alert') {
    const y = series.priceToCoordinate(d.price);
    if (y != null) {
      const flash = d.firedAt && Date.now() - d.firedAt < 1500;   // pulse bref au déclenchement
      ctx.strokeStyle = col; ctx.setLineDash([6, 5]);
      ctx.lineWidth = (d.width || 1.5) + (flash ? 1.5 : 0);
      if (flash) { ctx.shadowColor = col; ctx.shadowBlur = 14; }
      ctx.beginPath(); ctx.moveTo(28, y); ctx.lineTo(paneW(), y); ctx.stroke();
      ctx.setLineDash([]); ctx.shadowBlur = 0;
      // cloche à gauche + prix
      ctx.fillStyle = col; ctx.strokeStyle = col; ctx.lineWidth = 1.4;
      ctx.beginPath();
      ctx.moveTo(8, y + 5); ctx.lineTo(20, y + 5);
      ctx.moveTo(9.5, y + 5); ctx.quadraticCurveTo(9.5, y - 4, 14, y - 4);
      ctx.quadraticCurveTo(18.5, y - 4, 18.5, y + 5); ctx.stroke();
      ctx.beginPath(); ctx.arc(14, y + 7, 1.3, 0, 2 * Math.PI); ctx.fill();
      ctx.font = '600 10px Segoe UI'; ctx.fillText(fmt(d.price), 24, y - 5);
    }
  } else if (d.type === 'vline') {
    const x = xOf(d.t);
    if (x != null) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, paneH()); ctx.stroke(); }
  } else if (d.type === 'hray') {
    const [x, y] = px(d);
    if (x != null && y != null) {
      ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(paneW(), y); ctx.stroke();
      ctx.setLineDash([]); ctx.shadowBlur = 0; ctx.fillStyle = col; ctx.fillText(fmt(d.price), x + 6, y - 4);
    }
  } else if (d.type === 'text') {
    const [x, y] = px(d);
    if (x != null && y != null) { ctx.shadowBlur = Math.min(ambGlow, 2); ctx.fillStyle = col; ctx.font = '12px Segoe UI'; ctx.fillText(d.text, x, y); }
  } else if (d.type === 'brush') {
    ctx.beginPath();
    let started = false;
    d.pts.forEach(p => {
      const [x, y] = px(p);
      if (x == null || y == null) return;
      started ? ctx.lineTo(x, y) : ctx.moveTo(x, y);
      started = true;
    });
    ctx.stroke();
  } else if (d.type === 'channel') {
    const { x1, y1, x2, y2, y1b, y2b } = chanGeom(d);
    if ([x1, y1, x2, y2, y1b, y2b].every(v => v != null)) {
      ctx.beginPath();
      ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.lineTo(x2, y2b); ctx.lineTo(x1, y1b); ctx.closePath();
      ctx.fill();
      ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x1, y1b); ctx.lineTo(x2, y2b); ctx.stroke();
      const ym1 = series.priceToCoordinate(d.a.price + d.off / 2), ym2 = series.priceToCoordinate(d.b.price + d.off / 2);
      if (ym1 != null && ym2 != null) {
        ctx.setLineDash([4, 4]); ctx.lineWidth = Math.max(1, (d.width || 1.5) - .5);
        ctx.beginPath(); ctx.moveTo(x1, ym1); ctx.lineTo(x2, ym2); ctx.stroke();
      }
    }
  } else if (d.type === 'long' || d.type === 'short') {
    const isL = d.type === 'long';
    const GRN = '#4dc06a', RED = '#e0564d';
    const { xA, yE, xB, yT, yS } = posGeom(d);
    if ([xA, yE, xB, yT, yS].every(v => v != null)) {
      const xL = Math.min(xA, xB), w = Math.abs(xB - xA);
      ctx.setLineDash([]); ctx.lineWidth = 1;
      ctx.fillStyle = hexToRgba(GRN, .13); ctx.strokeStyle = GRN;
      boxFS(xL, yE, xL + w, yT);
      ctx.fillStyle = hexToRgba(RED, .13); ctx.strokeStyle = RED;
      boxFS(xL, yE, xL + w, yS);
      ctx.strokeStyle = GOLD_B; ctx.setLineDash([5, 4]);
      ctx.beginPath(); ctx.moveTo(xL, yE); ctx.lineTo(xL + w, yE); ctx.stroke();
      ctx.setLineDash([]);
      const rr = Math.abs(d.target - d.a.price) / Math.max(Math.abs(d.a.price - d.stop), 1e-9);
      ctx.font = '300 10px "Segoe UI"';   // graisse fine, uniquement pour les positions
      ctx.fillStyle = GRN;
      ctx.fillText(`Cible ${fmt(d.target)}  ${((d.target - d.a.price) / d.a.price * 100).toFixed(2)}%`,
        xL + 4, isL ? Math.min(yT, yE) + 11 : Math.max(yT, yE) - 4);
      ctx.fillStyle = GOLD_B;
      ctx.fillText(`${isL ? 'LONG' : 'SHORT'} ${fmt(d.a.price)}   R/R ${rr.toFixed(2)}`, xL + 4, yE - 4);
      ctx.fillStyle = RED;
      ctx.fillText(`Stop ${fmt(d.stop)}  ${((d.stop - d.a.price) / d.a.price * 100).toFixed(2)}%`,
        xL + 4, isL ? Math.max(yS, yE) - 4 : Math.min(yS, yE) + 11);
    }
  } else {
    const [x1, y1] = px(d.a), [x2, y2] = px(d.b);
    if ([x1, y1, x2, y2].every(v => v != null)) {
      if (d.type === 'trend') { ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke(); }
      else if (d.type === 'ray') {
        const [ex, ey] = rayEnd(x1, y1, x2, y2);
        ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(ex, ey); ctx.stroke();
      } else if (d.type === 'arrow') {
        ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
        const ang = Math.atan2(y2 - y1, x2 - x1);
        ctx.setLineDash([]); ctx.fillStyle = col;
        ctx.beginPath();
        ctx.moveTo(x2, y2);
        ctx.lineTo(x2 - 11 * Math.cos(ang - .4), y2 - 11 * Math.sin(ang - .4));
        ctx.lineTo(x2 - 11 * Math.cos(ang + .4), y2 - 11 * Math.sin(ang + .4));
        ctx.fill();
      } else if (d.type === 'rect') {
        /* style HUD validé par Meddy — les AUTRES outils restent au style d'origine */
        const xa = Math.min(x1, x2), xb = Math.max(x1, x2), ya = Math.min(y1, y2), yb = Math.max(y1, y2);
        const w = xb - xa, h = yb - ya;
        ctx.fillStyle = hexToRgba(col, .06);
        ctx.fillRect(xa, ya, w, h);
        ctx.setLineDash([]);
        ctx.lineWidth = 1;
        ctx.strokeStyle = hexToRgba(col, .35);
        ctx.strokeRect(xa + .5, ya + .5, w - 1, h - 1);
        const cr = Math.min(12, w / 3, h / 3);
        ctx.strokeStyle = col; ctx.lineWidth = d.width || 1.5;
        ctx.shadowColor = col; ctx.shadowBlur = hudGlow ? (isSel ? 14 : 10) : 0;
        ctx.beginPath();
        ctx.moveTo(xa, ya + cr); ctx.lineTo(xa, ya); ctx.lineTo(xa + cr, ya);
        ctx.moveTo(xb - cr, ya); ctx.lineTo(xb, ya); ctx.lineTo(xb, ya + cr);
        ctx.moveTo(xb, yb - cr); ctx.lineTo(xb, yb); ctx.lineTo(xb - cr, yb);
        ctx.moveTo(xa + cr, yb); ctx.lineTo(xa, yb); ctx.lineTo(xa, yb - cr);
        ctx.stroke();
        ctx.shadowBlur = 0;
        const k = RKINDS[d.kind];
        const lbl = (k ? k.label : '') + (d.tfk ? (k ? ' · ' : '') + zLabel(d.tfk) : '');
        if (lbl && w > 8 && h > 8) {   // label centré : rétrécit jusqu'à 7 px mais NE DISPARAÎT PAS (demande Meddy)
          const fs = Math.max(7, Math.min(24, h * .24, w * .14));
          ctx.fillStyle = hexToRgba(col, .92);
          ctx.font = `300 ${fs.toFixed(1)}px 'Bahnschrift Light', Bahnschrift, 'Segoe UI Light', 'Segoe UI', sans-serif`;
          ctx.letterSpacing = (fs * .22).toFixed(1) + 'px';
          ctx.shadowColor = col;
          ctx.shadowBlur = hudGlow ? Math.max(2, Math.min(8, fs * .5)) : 0;   // blur réduit en tout petit : lisible
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.fillText(lbl, xa + w / 2, ya + h / 2);
          ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
          ctx.shadowBlur = 0; ctx.letterSpacing = '0px';
        }
      } else if (d.type === 'ellipse') {
        ctx.beginPath();
        ctx.ellipse((x1 + x2) / 2, (y1 + y2) / 2, Math.abs(x2 - x1) / 2, Math.abs(y2 - y1) / 2, 0, 0, 2 * Math.PI);
        ctx.fill(); ctx.stroke();
      } else if (d.type === 'fib') {
        const xa = Math.min(x1, x2), xb = Math.max(x1, x2);
        [0, .236, .382, .5, .618, .786, 1].forEach(r => {
          const price = d.b.price + (d.a.price - d.b.price) * r;
          const y = series.priceToCoordinate(price);
          if (y == null) return;
          ctx.lineWidth = r === .5 ? (d.width || 1.5) + .7 : (d.width || 1.5);
          ctx.beginPath(); ctx.moveTo(xa, y); ctx.lineTo(xb, y); ctx.stroke();
          ctx.shadowBlur = 0; ctx.fillStyle = col;
          ctx.fillText(`${r}  ${fmt(price)}`, xb + 5, y + 3);
          ctx.shadowBlur = ambGlow;   // la ligne du niveau suivant garde son glow
        });
      } else if (d.type === 'measure') {
        const up = d.b.price >= d.a.price;
        const mCol = up ? GOLD : '#b0632f';
        ctx.fillStyle = hexToRgba(mCol, .14);
        ctx.strokeStyle = mCol;
        boxFS(x1, y1, x2, y2);
        const dp = d.b.price - d.a.price, pctm = dp / d.a.price * 100;
        const la = lOf(d.a.t), lb = lOf(d.b.t);
        const bars = la != null && lb != null ? Math.round(lb - la) : 0;
        ctx.font = '11px Segoe UI'; ctx.fillStyle = up ? GOLD_B : '#e0956c';
        ctx.fillText(`${dp >= 0 ? '+' : ''}${fmt(dp)}  (${pctm >= 0 ? '+' : ''}${pctm.toFixed(2)}%)  ${bars} bougies`,
          Math.min(x1, x2) + 4, Math.min(y1, y2) - 6);
      }
    }
  }
  ctx.restore();
  if (isSel) {
    handles(d).forEach(h => {
      if (h.x == null || h.y == null) return;
      ctx.beginPath();
      ctx.arc(h.x, h.y, 4.5, 0, 2 * Math.PI);
      ctx.fillStyle = '#0a0906'; ctx.fill();
      ctx.lineWidth = 1.5; ctx.strokeStyle = GOLD_B; ctx.setLineDash([]); ctx.stroke();
    });
  }
}
/* --- chrono de clôture de bougie (sous le prix, comme TV) --- */
const cdNext = { base: null, c: 0 };
function barCloseTs() {
  if (!candles.length) return null;
  const base = tf + '@' + candles[candles.length - 1].time;   // clé = TF + ouverture (barEnd dépend du TF)
  const now = (Date.now() + clockOff) / 1000;
  // ancré sur l'ouverture réelle ; mémoïsé : on ne ré-avance que depuis la dernière échéance connue
  if (cdNext.base !== base) { cdNext.base = base; cdNext.c = barEnd(candles[candles.length - 1].time); }
  for (let g = 0; cdNext.c <= now && g < 100000; g++) cdNext.c = barEnd(cdNext.c);
  return cdNext.c;
}
/* refs et cache : aucune lecture/écriture DOM superflue à 60 fps */
const cdEl = $('countdown'), cdP = cdEl.querySelector('.cdP'), cdT = cdEl.querySelector('.cdT');
const cdCache = { close: NaN, t: '', top: -1, w: -1, half: 0, tShown: true };
function updateCountdown() {
  const bar = curBar();
  if (!bar) { cdEl.hidden = true; return; }
  const y = series.priceToCoordinate(bar.close);
  if (y == null || y < 8 || y > paneH() - 8) { cdEl.hidden = true; return; }
  if (bar.close !== cdCache.close) { cdCache.close = bar.close; cdP.textContent = fmt(bar.close); }
  if (replay) {
    if (cdCache.tShown) { cdT.style.display = 'none'; cdCache.tShown = false; }
  } else {
    if (!cdCache.tShown) { cdT.style.display = ''; cdCache.tShown = true; }
    const close = barCloseTs();
    let s = Math.max(0, Math.floor(close - (Date.now() + clockOff) / 1000));
    const d = Math.floor(s / 86400); s -= d * 86400;
    const h = Math.floor(s / 3600), m = Math.floor(s % 3600 / 60), sec = s % 60;
    const p2 = n => String(n).padStart(2, '0');
    const txt = d > 0 ? `${d}j ${p2(h)}:${p2(m)}:${p2(sec)}` : h > 0 ? `${h}:${p2(m)}:${p2(sec)}` : `${p2(m)}:${p2(sec)}`;
    if (txt !== cdCache.t) { cdT.textContent = txt; cdCache.t = txt; }
  }
  cdEl.hidden = false;
  const w = chart.priceScale('right').width();
  if (w !== cdCache.w) { cdEl.style.width = w + 'px'; cdCache.w = w; }
  if (!cdCache.half) cdCache.half = cdP.offsetHeight / 2;   // hauteur du cartouche : mesurée une seule fois
  const top = Math.round(y - cdCache.half);
  if (top !== cdCache.top) { cdEl.style.top = top + 'px'; cdCache.top = top; }
}

/* invalidations : tout ce qui peut déplacer les tracés à l'écran */
ts().subscribeVisibleTimeRangeChange(invalidate);            // pan / zoom / nouvelles bougies
wrap.addEventListener('wheel', () => { lastPointer = Date.now(); invalidate(); }, { passive: true }); // zoom
wrap.addEventListener('touchmove', () => { lastPointer = Date.now(); invalidate(); }, { passive: true });
document.addEventListener('mousemove', e => { if (e.buttons) { lastPointer = Date.now(); invalidate(); } });
wrap.addEventListener('dblclick', invalidate);               // reset d'échelle

let apiBanShown = '';
function updateApiBan() {   // bandeau persistant pendant un ban 429/418 (le toast, lui, disparaît en 3 s)
  const left = apiCoolUntil - Date.now();
  const txt = left > 0 ? `⏳ Binance en pause ${Math.ceil(left / 1000)} s (débit dépassé)` : '';
  if (txt !== apiBanShown) {
    apiBanShown = txt;
    $('apiban').textContent = txt;
    $('apiban').hidden = !txt;
  }
}
(function render() {
  if (!cvH) sizeCv();   // auto-guérison si l'observer n'a jamais tiré
  updateCountdown();
  updateApiBan();
  if (legendHTML !== legendShown) { $('legend').innerHTML = legendShown = legendHTML; }
  if (lastPriceTxt !== lastPriceShown) { $('lastPrice').textContent = lastPriceShown = lastPriceTxt; }
  /* measure est statique une fois posée (ancrée t/prix, la vue invalide déjà) :
     plus de redraw 60 fps permanent tant qu'une règle reste affichée.
     redrawStreak : pendant une interaction POINTEUR continue (pan/drag), le glow de TOUS
     les tracés est coupé (shadowBlur coûteux) et rétabli par une frame de finition.
     Limite connue : les redraws pilotés par les ticks/replay gardent le glow — si ça
     devient un coût (WS actif + scène chargée), l'axe correct est un calque offscreen
     re-blitté, PAS un gating sur la continuité des redraws (ça tuerait le glow en live). */
  /* un geste EN ATTENTE (canal phase 2, picking) ne redessine que si le pointeur vit :
     souris immobile = 0 redraw (et le glow ne se coupe pas à vide) */
  const pointerLive = Date.now() - lastPointer < 300;
  const active = dirty || drag || ((temp || (replay && replay.picking)) && pointerLive) || Date.now() < alertFlashUntil;
  const polish = !active && redrawStreak > 2;
  if (!active) redrawStreak = 0;
  if (active || polish) {
    if (active) {
      dirty = false;
      /* le glow ne se coupe QUE pendant une interaction pointeur (pan/zoom/drag) :
         les ticks de données (aggTrade 300/s) invalident aussi, mais ne doivent pas l'éteindre */
      redrawStreak = (drag || temp || (replay && replay.picking) || Date.now() - lastPointer < 250)
        ? redrawStreak + 1 : 0;
    }
    hudGlow = redrawStreak <= 2;
    barSp = ts().options().barSpacing || 6;   // 1 lecture par frame dessinée, pas par ancre
    ctx.clearRect(0, 0, cvW, cvH);
    ctx.save();
    ctx.beginPath(); ctx.rect(0, 0, paneW(), paneH()); ctx.clip();   // rien ne peint par-dessus les axes
    /* ceinture : une exception dans un tracé ne doit jamais tuer la boucle rAF ;
       le restore compense le save de drawOne resté ouvert (no-op si pile vide) */
    const safeDraw = (d, isSel) => { try { drawOne(d, isSel); } catch { try { ctx.restore(); } catch {} } };
    if (showDraw) {
      drawings.forEach((d, i) => { if (!futureHidden(d)) safeDraw(d, i === sel); });
      if (temp) safeDraw(temp, false);
    }
    if (measure) safeDraw(measure, false);
    if (replay && replay.picking && curtainX != null) {
      const w = paneW(), h = paneH();
      if (curtainX < w) {
        ctx.fillStyle = 'rgba(3,3,2,.8)';
        ctx.fillRect(curtainX, 0, w - curtainX, h);
        ctx.strokeStyle = GOLD_B; ctx.lineWidth = 1.5; ctx.setLineDash([]);
        ctx.beginPath(); ctx.moveTo(curtainX, 0); ctx.lineTo(curtainX, h); ctx.stroke();
        ctx.fillStyle = GOLD_B; ctx.font = '11px Segoe UI';
        ctx.fillText('◀ départ du replay', Math.max(6, curtainX - 110), 16);
      }
    }
    ctx.restore();   // fin du clip pane
  }
  requestAnimationFrame(render);
})();

/* --- bougies du passé : chargement auto en scrollant vers la gauche --- */
let oldErrUntil = 0;   // pause après une erreur API (ban 429/418) : pas de tempête de requêtes au bord gauche
ts().subscribeVisibleLogicalRangeChange(async r => {
  // contexte périmé (backoff après changement TF/symbole) : tout fetch mélangerait deux actifs
  if (!r || r.from > 30 || replay || ctxBusy() || loadingOld || oldestDone || Date.now() < oldErrUntil
      || !candles.length || candles.length >= MAX_BARS) return;   // plein : pas de fetch pour rien
  loadingOld = true;
  try {
    let older;
    if (isSecTf()) {                             // secondes : pagination arrière des trades, à la demande du scroll
      older = await fetchOlderSec();
      if (replay) return;
      if (older === OLDEST) { oldestDone = true; return; }
      if (older == null) return;                 // erreur/contexte : on retentera au prochain scroll
      const head = candles[0], lastNew = older[older.length - 1];
      if (lastNew && head && lastNew.time === head.time) {   // fusion du seau frontière (trades du même seau)
        head.open = lastNew.open;
        if (lastNew.high > head.high) head.high = lastNew.high;
        if (lastNew.low < head.low) head.low = lastNew.low;
        head.volume += lastNew.volume;
        older.pop();
      }
      if (!older.length) return;
    } else {
      older = await fetchOlder(KL_PAGE);         // page à poids réduit (5 vs 10) — 2× moins cher par bougie
      if (replay) return;                        // supplanté pendant le fetch
      if (older === FETCH_ERR) { oldErrUntil = Date.now() + 30000; return; } // erreur API/réseau : pause 30 s
      if (older == null) return;                 // contexte périmé (seq/tête) → réponse jetée
    }
    const room = MAX_BARS - candles.length;      // ne JAMAIS franchir le plafond : le cap live raserait la tête
    if (room <= 0) return;                       // plein TRANSITOIREMENT (dérive live) : on ne verrouille pas
    if (older.length >= room) {                  // >= : couvre le cas limite exact, sans requête fantôme ensuite
      older = older.slice(older.length - room);
      oldestDone = true;
    }
    if (!older.length) { oldestDone = true; return; }
    candles = older.concat(candles);
    setAllDeferInd(candles);
    // page « pleine » d'un TF agrégé = KL_PAGE/fact seaux (moins le partiel écarté)
    if (!isSecTf() && older.length < Math.floor(KL_PAGE / (tfDef().fact || 1)) - 1) oldestDone = true;
  } catch {} finally { loadingOld = false; }
});

try {
  const st = JSON.parse(localStorage.getItem('orion-theme'));
  const okc = c => typeof c === 'string' && /^#[0-9a-f]{6}$/i.test(c);   // couleur stricte, pas juste truthy
  const valid = st && okc(st.bg) && okc(st.grid) && okc(st.up) && okc(st.down) && (st.downLine == null || okc(st.downLine));
  applyTheme(valid ? st : { ...THEMES.or }, false);
} catch { applyTheme({ ...THEMES.or }, false); }
document.querySelectorAll('.tool[data-tip]').forEach(b => b.setAttribute('aria-label', b.dataset.tip));
$('propKind').setAttribute('aria-label', 'Type de rectangle');
$('propTf').setAttribute('aria-label', 'TF de la zone');
$('propWidth').setAttribute('aria-label', 'Épaisseur du trait');
$('propStyle').setAttribute('aria-label', 'Style de trait');
$('rpSpeed').setAttribute('aria-label', 'Vitesse du replay');
$('magnetBtn').setAttribute('aria-pressed', 'false');
$('eyeBtn').setAttribute('aria-pressed', 'true');
$('txtIn').maxLength = TEXT_MAX;   // la constante fait foi, pas l'attribut HTML
$('symBtn').textContent = symbol + ' ▾';   // reflète le symbole restauré
sizeCv();
syncPropbar();
loadDrawings();

/* ===== G-ON : seam d'integration de la feature POI (additif, aucun refactor) ===== */
window.__gon = {
  chart, series, ts,
  get symbol() { return symbol; },
  get tf() { return tf; },
  get tfSec() { return tfDef().sec; },
  get theme() { return theme; },
  priceToY: p => series.priceToCoordinate(p),
  timeToX: xOf,
  mount: $('chartwrap'),
  invalidate,
};

/* G-ON : DEFILEMENT AUTOMATIQUE — si on a scrolle dans le passe, le chart
   revient tout seul au direct apres 30 s sans interaction (souhait Meddy).
   Jamais pendant un replay ni un chargement ; toute interaction re-arme. */
let gonLastTouch = Date.now();
['pointerdown', 'wheel', 'touchstart', 'keydown'].forEach(ev =>
  $('chartwrap').addEventListener(ev, () => { gonLastTouch = Date.now(); }, { passive: true }));
setInterval(() => {
  if (replay || loading || Date.now() - gonLastTouch < 30000) return;
  try {
    const n = dataNow().length; if (!n) return;
    const lr = ts().getVisibleLogicalRange();
    if (lr && lr.to < n - 1) snapToLive();   // derniere bougie hors vue -> retour au direct
  } catch {}
}, 2000);

load();
</script>
